<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>线上支付</title>
  <link rel="stylesheet" href="../../assets/css/common.css">
  <link rel="stylesheet" href="./recharge.css?v=10">
</head>
<body class="deco-bg">
<!-- 屏幕级装饰层（与「输入房间号」页同款）：4 角卷草固定贴屏 -->
<div class="screen-deco" aria-hidden="true">
  <img class="cd cd-tl" src="../../assets/images/corner-flourish.png" alt="">
  <img class="cd cd-tr" src="../../assets/images/corner-flourish.png" alt="">
  <img class="cd cd-bl" src="../../assets/images/corner-flourish.png" alt="">
  <img class="cd cd-br" src="../../assets/images/corner-flourish.png" alt="">
</div>


<div class="page recharge-page">

  <div class="app-bar">
    <div class="back" id="backBtn">‹</div>
    <div class="title">线 上 支 付</div>
    <div class="right"></div>
  </div>

  <!-- 页面标题：与「游戏大厅」同款样式 -->
  <h1 class="recharge-title">线 上 支 付</h1>

  <div class="page-body">

    <!-- ===== 卡片 1：账户信息 ===== -->
    <div class="r-card r-account">
      <div class="ra-row">
        <div class="ra-avatar"><img id="userAvatar" alt=""></div>
        <div class="ra-info">
          <div class="ra-name" id="userName">—</div>
          <div class="ra-id">
            <span class="dot"></span>ID&nbsp;<span id="userId">———</span>
          </div>
        </div>
        <div class="ra-balance">
          <div class="rb-label">当 前 积 分</div>
          <div class="rb-num" id="balance">0</div>
        </div>
      </div>
    </div>

    <!-- ===== 卡片 2：上 / 下分 + 金额 ===== -->
    <div class="r-card r-main">

      <!-- Tab：上 分 / 下 分 -->
      <div class="r-tabs">
        <div class="rt-item active" data-type="up">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 19V5"/>
            <path d="M6 11l6-6 6 6"/>
          </svg>
          <span>上 分</span>
        </div>
        <div class="rt-item" data-type="down">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 5v14"/>
            <path d="M6 13l6 6 6-6"/>
          </svg>
          <span>下 分</span>
        </div>
      </div>

      <!-- 金额输入 -->
      <div class="r-field">
        <div class="rf-label">
          <span id="amountLabel">上 分 金 额</span>
          <span class="rf-hint" id="amountHint">（请输入整数积分）</span>
        </div>
        <div class="rf-input">
          <span class="rf-prefix">¥</span>
          <input id="amountInput" type="text" inputmode="numeric" placeholder="请 输 入 金 额" maxlength="9" />
          <button class="rf-clear" id="clearBtn" type="button" aria-label="清空">×</button>
        </div>
        <!-- 快捷金额 -->
        <div class="r-quick">
          <button type="button" class="rq-item" data-v="100">100</button>
          <button type="button" class="rq-item" data-v="500">500</button>
          <button type="button" class="rq-item" data-v="1000">1,000</button>
          <button type="button" class="rq-item" data-v="3000">3,000</button>
          <button type="button" class="rq-item" data-v="5000">5,000</button>
          <button type="button" class="rq-item" data-v="10000">10,000</button>
        </div>
      </div>

    </div>

    <!-- ===== 上分 / 下分类型（单选） ===== -->
    <div class="r-card r-paytype" id="payTypeCard">
      <div class="rpt-head" id="payTypeHead">上 分 类 型</div>
      <div class="rpt-options" id="payTypeOptions" role="radiogroup" aria-label="上分类型">
        <button type="button" class="rpt-item active" data-pay="wechat" aria-pressed="true">微 信</button>
        <button type="button" class="rpt-item" data-pay="alipay" aria-pressed="false">支 付 宝</button>
        <button type="button" class="rpt-item" data-pay="unionpay" aria-pressed="false">银 联</button>
      </div>
    </div>

    <!-- ===== 提交按钮 ===== -->
    <button type="button" class="r-submit" id="submitBtn">提 交 申 请</button>

    <!-- 底部联系客服 -->
    <div class="r-foot">
      还 有 疑 问 ？ 请 联 系
      <a class="rf-link" id="csLink">人 工 客 服</a>
    </div>

  </div>

</div>

<!-- 提交结果抽屉：必须挂在 body 下（不能放在 .page 内）
     .page 有 z-index:1 会形成独立层，tabbar 在 body 上 z-index:100 会盖住 page 内所有 fixed 元素 -->
<div class="r-sheet-mask" id="resultMask"></div>
<div class="r-sheet" id="resultSheet" aria-hidden="true">
  <div class="rs-handle"></div>

  <div class="rs-icon-wrap">
    <div class="rs-icon" id="rsIcon">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/>
        <path d="M7.5 12.5l3 3 6-7"/>
      </svg>
    </div>
  </div>

  <div class="rs-title" id="rsTitle">申 请 已 提 交</div>
  <div class="rs-subtitle" id="rsSubtitle">请联系客服跟进审核进度</div>

  <div class="rs-detail">
    <div class="rsd-row">
      <span class="rsd-k">申 请 内 容</span>
      <span class="rsd-v rsd-v-gold" id="rsLabel">—</span>
    </div>
    <div class="rsd-row">
      <span class="rsd-k">时 间</span>
      <span class="rsd-v" id="rsTime">—</span>
    </div>
    <div class="rsd-row">
      <span class="rsd-k">状 态</span>
      <span class="rsd-v rsd-status" id="rsStatus">待 审 核</span>
    </div>
  </div>

  <div class="rs-actions">
    <button type="button" class="rs-btn rs-btn-ghost" id="rsLater">稍 后 再 说</button>
    <button type="button" class="rs-btn rs-btn-primary" id="rsGoCs">立 即 联 系 客 服</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="../../assets/js/common.js"></script>
<script src="./recharge.js"></script>

</body>
</html>
