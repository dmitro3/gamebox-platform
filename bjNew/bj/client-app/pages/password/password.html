<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>修改密码</title>
  <link rel="stylesheet" href="../../assets/css/common.css">
  <link rel="stylesheet" href="./password.css">
</head>
<body class="deco-bg">
<!-- 屏幕级装饰层（与「输入房间号」页同款）：4 角卷草固定贴屏 -->
<div class="screen-deco" aria-hidden="true">
  <img class="cd cd-tl" src="../../assets/images/corner-flourish.png" alt="">
  <img class="cd cd-tr" src="../../assets/images/corner-flourish.png" alt="">
  <img class="cd cd-bl" src="../../assets/images/corner-flourish.png" alt="">
  <img class="cd cd-br" src="../../assets/images/corner-flourish.png" alt="">
</div>


<div class="page password-page">

  <div class="app-bar">
    <div class="back" id="backBtn">‹</div>
    <div class="title">修 改 密 码</div>
    <div class="right"></div>
  </div>

  <div class="page-body">

    <!-- 当前账号信息卡片 -->
    <div class="pwd-account-card">
      <div class="pac-avatar"><img id="userAvatar" alt=""></div>
      <div class="pac-info">
        <div class="pac-name" id="userName">———</div>
        <div class="pac-meta">
          <span class="pac-label">账号</span>
          <span class="pac-account" id="userAccount">———</span>
        </div>
      </div>
    </div>

    <!-- 表单卡片 -->
    <div class="pwd-form-card">
      <div class="pwd-row">
        <label class="pwd-label">当 前 密 码</label>
        <div class="pwd-input-wrap">
          <input type="password" id="oldPwd" placeholder="请输入当前密码" maxlength="32" autocomplete="current-password">
          <button type="button" class="pwd-eye" data-target="oldPwd" aria-label="显示/隐藏密码">
            <svg viewBox="0 0 24 24" class="eye-close" aria-hidden="true">
              <path d="M3 3l18 18"/>
              <path d="M10.6 6.1A11 11 0 0 1 12 6c5 0 9 4 10 6-.4.8-1.4 2.5-3 4M6.5 7.7C4 9.2 2.4 11.3 2 12c1 2 5 6 10 6 1.7 0 3.3-.5 4.7-1.3"/>
              <path d="M9.9 9.9A3 3 0 0 0 14.1 14.1"/>
            </svg>
            <svg viewBox="0 0 24 24" class="eye-open" aria-hidden="true" style="display:none;">
              <path d="M2 12s4-6 10-6 10 6 10 6-4 6-10 6S2 12 2 12z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="pwd-row">
        <label class="pwd-label">新 密 码</label>
        <div class="pwd-input-wrap">
          <input type="password" id="newPwd" placeholder="6 位以上" maxlength="32" autocomplete="new-password">
          <button type="button" class="pwd-eye" data-target="newPwd" aria-label="显示/隐藏密码">
            <svg viewBox="0 0 24 24" class="eye-close" aria-hidden="true">
              <path d="M3 3l18 18"/>
              <path d="M10.6 6.1A11 11 0 0 1 12 6c5 0 9 4 10 6-.4.8-1.4 2.5-3 4M6.5 7.7C4 9.2 2.4 11.3 2 12c1 2 5 6 10 6 1.7 0 3.3-.5 4.7-1.3"/>
              <path d="M9.9 9.9A3 3 0 0 0 14.1 14.1"/>
            </svg>
            <svg viewBox="0 0 24 24" class="eye-open" aria-hidden="true" style="display:none;">
              <path d="M2 12s4-6 10-6 10 6 10 6-4 6-10 6S2 12 2 12z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="pwd-strength" id="pwdStrength">
          <div class="ps-bar"><div class="ps-fill" id="psFill"></div></div>
          <span class="ps-text" id="psText">—</span>
        </div>
      </div>

      <div class="pwd-row">
        <label class="pwd-label">确 认 新 密 码</label>
        <div class="pwd-input-wrap">
          <input type="password" id="newPwd2" placeholder="再次输入新密码" maxlength="32" autocomplete="new-password">
          <button type="button" class="pwd-eye" data-target="newPwd2" aria-label="显示/隐藏密码">
            <svg viewBox="0 0 24 24" class="eye-close" aria-hidden="true">
              <path d="M3 3l18 18"/>
              <path d="M10.6 6.1A11 11 0 0 1 12 6c5 0 9 4 10 6-.4.8-1.4 2.5-3 4M6.5 7.7C4 9.2 2.4 11.3 2 12c1 2 5 6 10 6 1.7 0 3.3-.5 4.7-1.3"/>
              <path d="M9.9 9.9A3 3 0 0 0 14.1 14.1"/>
            </svg>
            <svg viewBox="0 0 24 24" class="eye-open" aria-hidden="true" style="display:none;">
              <path d="M2 12s4-6 10-6 10 6 10 6-4 6-10 6S2 12 2 12z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- 规则提示 -->
    <ul class="pwd-rules">
      <li>密 码 长 度 6 位 以 上</li>
      <li>新 密 码 不 能 与 当 前 密 码 相 同</li>
      <li>建 议 包 含 字 母 + 数 字 以 增 强 安 全</li>
    </ul>

    <button type="button" class="pwd-submit" id="submitBtn">
      <span class="ps-glow"></span>
      <span class="ps-text">确 认 修 改</span>
    </button>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="../../assets/js/common.js"></script>
<script src="./password.js"></script>

</body>
</html>
