<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>网络连接异常</title>
  <link rel="stylesheet" href="../../assets/css/common.css">
  <link rel="stylesheet" href="../../assets/css/status-page.css">
</head>
<body>

<div class="status-page is-offline">

  <div class="sp-icon-wrap">
    <div class="sp-icon">
      <svg viewBox="0 0 64 64" aria-hidden="true">
        <!-- 大金色 WiFi 信号（被斜杠划掉表示离线） -->
        <path d="M8 22 q24 -22 48 0"/>
        <path d="M16 30 q16 -14 32 0"/>
        <path d="M24 38 q8 -7 16 0"/>
        <circle cx="32" cy="46" r="2.4" fill="currentColor"/>
        <!-- 红色斜杠"已断开" -->
        <line x1="14" y1="14" x2="50" y2="50" stroke-width="3"/>
      </svg>
    </div>
  </div>

  <div class="sp-title">网 络 连 接 异 常</div>
  <div class="sp-sub" id="spSub">
    请 检 查 您 的 网 络 设 置 后 重 试 ， 或 尝 试 切 换 移 动 网 络 / WiFi
  </div>

  <div class="sp-actions">
    <button type="button" class="sp-btn sp-btn-ghost" id="backBtn">返 回 上 一 页</button>
    <button type="button" class="sp-btn sp-btn-primary" id="retryBtn">重 新 加 载</button>
  </div>

  <div class="sp-footer">
    若 网 络 已 正 常 ， 多 次 重 试 仍 失 败 请 联 系 <em>客 服</em>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="../../assets/js/common.js"></script>
<script src="./offline.js"></script>

</body>
</html>
