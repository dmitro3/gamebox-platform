<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>申请记录</title>
  <link rel="stylesheet" href="../../assets/css/common.css">
  <link rel="stylesheet" href="./apply-records.css">
</head>
<body class="deco-bg">
<div class="screen-deco" aria-hidden="true">
  <img class="cd cd-tl" src="../../assets/images/corner-flourish.png" alt="">
  <img class="cd cd-tr" src="../../assets/images/corner-flourish.png" alt="">
  <img class="cd cd-bl" src="../../assets/images/corner-flourish.png" alt="">
  <img class="cd cd-br" src="../../assets/images/corner-flourish.png" alt="">
</div>

<div class="page ar-page">
  <div class="app-bar">
    <div class="back" id="backBtn">‹</div>
    <div class="title">申请记录</div>
    <div class="right"></div>
  </div>

  <div class="page-body">
    <h1 class="ar-title">申 请 记 录</h1>

    <!-- 6 时间 tab -->
    <div class="time-tabs">
      <button class="tt-item active" data-range="today">今 日</button>
      <button class="tt-item"        data-range="yesterday">昨 日</button>
      <button class="tt-item"        data-range="thisweek">本 周</button>
      <button class="tt-item"        data-range="lastweek">上 周</button>
      <button class="tt-item"        data-range="thismonth">本 月</button>
      <button class="tt-item"        data-range="lastmonth">上 个 月</button>
    </div>

    <div class="ar-list" id="arList"></div>

    <div class="lobby-spacer"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="../../assets/js/common.js"></script>
<script src="./apply-records.js"></script>
</body>
</html>
