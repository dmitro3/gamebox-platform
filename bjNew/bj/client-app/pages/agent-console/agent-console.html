<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>金御汇 · 房主控制台</title>
  <link rel="stylesheet" href="../../assets/css/common.css">
  <link rel="stylesheet" href="../../assets/css/staff-console.css">
</head>
<body class="deco-bg">
<div class="screen-deco" aria-hidden="true">
  <img class="cd cd-tl" src="../../assets/images/corner-flourish.png" alt="">
  <img class="cd cd-tr" src="../../assets/images/corner-flourish.png" alt="">
  <img class="cd cd-bl" src="../../assets/images/corner-flourish.png" alt="">
  <img class="cd cd-br" src="../../assets/images/corner-flourish.png" alt="">
</div>

<div class="page staff-console-page">
  <div class="app-bar">
    <div class="back" id="backBtn" aria-label="返回">‹</div>
    <div class="title">房主控制台</div>
    <div class="right"></div>
  </div>

  <div class="page-body">
    <div class="sc-welcome">
      <p class="sc-role">G O L D &nbsp;·&nbsp; H U B</p>
      <h1 class="sc-greet">欢 迎，<em id="staffName">—</em></h1>
      <p class="sc-meta">账号 <span id="staffAccount">—</span></p>
    </div>

    <div class="sc-menu">
      <button type="button" class="sc-item" data-href="../approval-list/approval-list.html">
        <span class="sc-ic">📋</span>
        <span class="sc-lb">玩 家 入 房 审 核</span>
        <span class="sc-arrow">›</span>
      </button>
      <button type="button" class="sc-item sc-item-muted" disabled>
        <span class="sc-ic">🏠</span>
        <span class="sc-lb">房 间 设 置</span>
        <span class="sc-arrow">…</span>
      </button>
      <button type="button" class="sc-item sc-item-muted" disabled>
        <span class="sc-ic">📈</span>
        <span class="sc-lb">房 间 数 据</span>
        <span class="sc-arrow">…</span>
      </button>
    </div>

    <button type="button" class="sc-logout" id="btnLogout">退 出 登 录</button>
    <p class="sc-tip">测试账号：1 / 1</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="../../assets/js/common.js"></script>
<script src="./agent-console.js"></script>
</body>
</html>
