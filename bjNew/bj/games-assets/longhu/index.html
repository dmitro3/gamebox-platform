<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>龙虎斗</title>
  <link rel="stylesheet" href="../../client-app/assets/css/common.css">
  <link rel="stylesheet" href="./css/lhd.css?v=1">
</head>
<body class="lhd-body lhd-body--splash">

<div class="lhd-splash" id="lhdSplash">
  <img class="lhd-splash__bg" src="./assets/splash.png?v=1" alt="" draggable="false">
  <div class="lhd-splash__action">
    <div class="lhd-splash__load" id="splashLoad">
      <div class="lhd-splash__load-track" aria-hidden="true">
        <div class="lhd-splash__load-bar" id="splashBar"></div>
      </div>
      <span class="lhd-splash__load-pct" id="splashPct">0%</span>
    </div>
    <button type="button" class="lhd-splash__start" id="splashStart" hidden>开始游戏</button>
  </div>
</div>

<div class="lhd-room" id="lhdRoom" hidden>
  <div class="lhd-bg" aria-hidden="true"></div>
  <button type="button" class="lhd-back" id="backBtn" aria-label="返回"></button>

  <header class="lhd-top">
    <div class="lhd-top-banner">
      <span class="lhd-top-banner__text">龙虎斗</span>
      <span class="lhd-top-banner__sub">龙争虎斗 · 押中即赢</span>
    </div>
  </header>

  <main class="lhd-stage">
    <div class="lhd-table">
      <div class="lhd-table__felt" aria-hidden="true"></div>
      <img class="lhd-table__frame" src="./assets/table-frame.png?v=1" alt="" draggable="false">

      <div class="lhd-side lhd-side--dragon" id="sideDragon">
        <span class="lhd-side__badge">龙</span>
        <div class="lhd-card" id="dragonCard">
          <div class="lhd-card__back" aria-hidden="true"></div>
          <div class="lhd-card__face" id="dragonFace"></div>
        </div>
        <span class="lhd-side__pts" id="dragonPts"></span>
      </div>

      <div class="lhd-center" id="centerPanel">
        <div class="lhd-center__panel" aria-hidden="true"></div>
        <div class="lhd-center__info">
          <p class="lhd-center__title" id="centerTitle">请押注</p>
          <p class="lhd-center__sub" id="centerSub">点击下方押注键</p>
        </div>
      </div>

      <div class="lhd-side lhd-side--tiger" id="sideTiger">
        <span class="lhd-side__badge">虎</span>
        <div class="lhd-card" id="tigerCard">
          <div class="lhd-card__back" aria-hidden="true"></div>
          <div class="lhd-card__face" id="tigerFace"></div>
        </div>
        <span class="lhd-side__pts" id="tigerPts"></span>
      </div>
    </div>
    <p class="lhd-result" id="resultText"></p>
  </main>

  <div class="lhd-foot">
    <div class="lhd-mid-band">
      <div class="lhd-mid-stats">
        <div class="lhd-stat-pod">
          <img class="lhd-stat-pod__icon" src="./assets/icon-wallet.png?v=1" alt="">
          <span class="lhd-stat-pod__val" id="statBalance">0</span>
        </div>
        <div class="lhd-stat-pod is-bet">
          <img class="lhd-stat-pod__icon" src="./assets/icon-coin.png?v=1" alt="">
          <span class="lhd-stat-pod__val" id="statBet">0</span>
        </div>
        <div class="lhd-stat-pod">
          <img class="lhd-stat-pod__icon" src="./assets/icon-prize.png?v=1" alt="">
          <span class="lhd-stat-pod__val" id="statWin">0</span>
        </div>
      </div>
    </div>

    <div class="lhd-bet-keys" id="betKeys" aria-label="押注键"></div>

    <footer class="lhd-actions">
      <button type="button" class="lhd-act lhd-act--clear" id="btnClear">
        <img src="./assets/btn-clear.png?v=1" alt=""><span>清除</span>
      </button>
      <button type="button" class="lhd-act lhd-act--start" id="btnStart" aria-label="开牌">
        <img src="./assets/btn-start.png?v=1" alt="">
      </button>
      <button type="button" class="lhd-act lhd-act--all" id="btnAllBet">
        <img src="./assets/btn-allbet.png?v=1" alt=""><span>全押</span>
      </button>
      <div class="lhd-unit-bet">
        <button type="button" class="lhd-unit-bet__btn" id="btnMinus">−</button>
        <span class="lhd-unit-bet__val" id="unitBetLabel">10</span>
        <button type="button" class="lhd-unit-bet__btn" id="btnPlus">+</button>
      </div>
    </footer>
  </div>
</div>

<div class="lhd-sheet-mask" id="sheetMask" hidden></div>
<div class="lhd-sheet" id="rulesSheet" hidden>
  <header class="lhd-sheet__head">
    <h2>游戏规则</h2>
    <button type="button" class="lhd-sheet__x" id="sheetClose">×</button>
  </header>
  <div class="lhd-sheet__body" id="sheetBody"></div>
  <footer class="lhd-sheet__foot">
    <button type="button" class="lhd-sheet__ok" id="sheetOk">知道了</button>
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="../../client-app/assets/js/common.js"></script>
<script src="./js/lhd-splash.js?v=1"></script>
<script src="./js/lhd.js?v=1"></script>
</body>
</html>
