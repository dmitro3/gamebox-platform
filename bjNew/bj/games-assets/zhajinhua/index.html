<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>炸金花</title>
  <link rel="stylesheet" href="../../client-app/assets/css/common.css">
  <link rel="stylesheet" href="./css/zjh.css">
</head>
<body class="zjh-body zjh-bg">

<div class="zjh-room">
  <div class="zjh-room-glow" aria-hidden="true"></div>
  <!-- 顶：返回+标题 | 统计 2×2 -->
  <header class="zjh-head">
    <div class="zjh-head__brand">
      <button type="button" class="zjh-head-back" id="backBtn" aria-label="返回"></button>
      <h1 class="zjh-head-title">炸 金 花</h1>
    </div>
    <div class="zjh-stats" id="statsBar">
      <div class="zjh-stat"><span class="k">积分</span><span class="v" id="statBalance">0</span></div>
      <div class="zjh-stat"><span class="k">输赢</span><span class="v" id="statWinloss">0</span></div>
      <div class="zjh-stat"><span class="k">流水</span><span class="v" id="statTurnover">0</span></div>
      <div class="zjh-stat"><span class="k">回水</span><span class="v" id="statRebate">0</span></div>
    </div>
  </header>

  <!-- 期号卡片：左期数 · 中秒表 · 右按钮 -->
  <section class="zjh-issue-card">
    <div class="zjh-issue-card__left">
      <span class="lbl">期数</span>
      <span class="val" id="curIssue">00000000</span>
    </div>

    <div class="zjh-issue-card__mid">
      <div class="zjh-timer" id="countdownBox">
        <svg class="zjh-timer__ring" viewBox="0 0 100 40" preserveAspectRatio="none" aria-hidden="true">
          <rect class="zjh-timer__ring-track" x="1.5" y="1.5" width="97" height="37" rx="5" ry="5" pathLength="1" />
          <rect class="zjh-timer__ring-fill" x="1.5" y="1.5" width="97" height="37" rx="5" ry="5" pathLength="1" />
        </svg>
        <div class="zjh-timer__row">
          <span class="zjh-timer__lbl" id="cdLabel">距封盘</span>
          <span class="zjh-timer__time" id="cdTime">--:--</span>
        </div>
      </div>
    </div>

    <div class="zjh-issue-card__acts">
      <button type="button" class="zjh-issue-btn" id="btnSlip">注单</button>
      <button type="button" class="zjh-issue-btn" id="btnLong">长龙</button>
      <button type="button" class="zjh-issue-btn" id="btnPredict">预测</button>
    </div>
  </section>

  <!-- 荷官发牌台：平台派三张牌 -->
  <section class="zjh-dealer" id="dealerTable" aria-label="发牌台">
    <div class="zjh-dealer__shoe-row">
      <div class="zjh-shoe" id="shoeCenter">
        <div class="zjh-shoe__pile" id="shoeDeck" aria-hidden="true">
          <span class="zjh-shoe__card"></span>
          <span class="zjh-shoe__card"></span>
          <span class="zjh-shoe__card"></span>
          <span class="zjh-shoe__card"></span>
          <span class="zjh-shoe__card"></span>
        </div>
        <span class="zjh-shoe__tag">一副牌 · 52张</span>
      </div>
      <div class="zjh-dealer__status" id="dealerStatus">请下注</div>
    </div>
    <div class="zjh-dealer__stage">
      <div class="zjh-deal-zone" id="zoneHand">
        <div class="zjh-deal-zone__head">
          <span class="zjh-deal-zone__lbl">本期手牌</span>
          <span class="zjh-deal-zone__type" id="handType">—</span>
        </div>
        <div class="zjh-deal-zone__slots" id="handSlots">
          <div class="zjh-deal-slot" data-i="0"></div>
          <div class="zjh-deal-slot" data-i="1"></div>
          <div class="zjh-deal-slot" data-i="2"></div>
        </div>
        <div class="zjh-dealer__meta">
          <span id="metaPoint">点数 —</span>
          <span id="metaColor">花色 —</span>
        </div>
      </div>
    </div>
    <div class="zjh-flying-layer" id="flyingLayer" aria-hidden="true"></div>
  </section>

  <!-- 开奖下拉栏 -->
  <section class="zjh-draw-bar" id="drawBar">
    <button type="button" class="zjh-draw-bar__main" id="drawToggle" aria-expanded="false">
      <span class="zjh-draw-bar__issue" id="barIssue">00000000</span>
      <span class="zjh-draw-bar__balls" id="barBalls" class="bar-cards"></span>
      <span class="zjh-draw-bar__gy" id="barGy">牌型 —</span>
      <span class="zjh-draw-bar__arrow" id="drawArrow">▼</span>
    </button>
    <div class="zjh-draw-panel" id="drawPanel">
      <div class="zjh-draw-table-wrap">
        <table class="zjh-draw-table">
          <colgroup>
            <col class="col-issue">
            <col class="col-ball" span="3">
            <col class="col-gy">
            <col class="col-lh">
          </colgroup>
          <thead>
            <tr>
              <th>期数</th>
              <th>牌1</th><th>牌2</th><th>牌3</th><th>牌型</th><th>点数</th>
            </tr>
          </thead>
          <tbody id="drawTableBody"></tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- 聊天主栏：全房间下注信息 -->
  <main class="zjh-chat" id="chatFeed" role="log" aria-live="polite"></main>

  <!-- 右侧浮钮 -->
  <aside class="zjh-rail" aria-label="快捷操作">
    <button type="button" class="zjh-rail-btn" id="btnCs" title="客服">
      <span class="zjh-rail-icon zjh-rail-icon--cs"></span>
      <span class="zjh-rail-txt">客服</span>
    </button>
    <button type="button" class="zjh-rail-btn" id="btnExpand" title="展开玩法">
      <span class="zjh-rail-icon zjh-rail-icon--expand"></span>
      <span class="zjh-rail-txt">玩法</span>
    </button>
    <button type="button" class="zjh-rail-btn" id="btnRedpack" title="红包">
      <span class="zjh-rail-icon zjh-rail-icon--rp"></span>
      <span class="zjh-rail-txt">红包</span>
    </button>
  </aside>

  <!-- 底部输入 -->
  <footer class="zjh-composer">
    <input type="text" class="zjh-input" id="chatInput" placeholder="如：大 100、豹子 50、金花 80" autocomplete="off" enterkeyhint="send">
    <button type="button" class="zjh-plus-btn" id="plusBtn" aria-label="更多">+</button>
  </footer>

  <!-- 投注键盘 -->
  <div class="zjh-keypad" id="keypad" hidden>
    <div class="zjh-keypad__tools">
      <button type="button" data-cmd="topup">上分</button>
      <button type="button" data-cmd="cancel">取消</button>
      <button type="button" data-cmd="allin">梭哈</button>
      <button type="button" data-cmd="repeat">重复</button>
      <button type="button" data-cmd="withdraw">下分</button>
    </div>
    <div class="zjh-keypad__grid" id="keyGrid"></div>
  </div>

  <!-- + 菜单：2 行 × 4 列 = 8 项 -->
  <div class="zjh-menu-mask" id="menuMask" hidden></div>
  <div class="zjh-plus-menu" id="plusMenu" hidden>
    <button type="button" data-link="recharge">存款</button>
    <button type="button" data-link="withdraw">取款</button>
    <button type="button" data-link="apply-records">申请记录</button>
    <button type="button" data-link="welfare">自助回水</button>
    <button type="button" data-link="bet-records">竞猜报表</button>
    <button type="button" data-link="flow">回水报表</button>
    <button type="button" data-link="redpack">红包报表</button>
    <button type="button" data-link="points-log">积分账变</button>
  </div>

  <!-- 玩法展开 -->
  <div class="zjh-play-mask" id="playMask" hidden></div>
  <div class="zjh-play-sheet" id="playSheet" hidden>
    <div class="zjh-play-sheet__head">
      <span>全部玩法</span>
      <button type="button" id="playSheetClose">×</button>
    </div>
    <div class="zjh-play-sheet__body" id="playSheetBody"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="../../client-app/assets/js/common.js"></script>
<script src="./js/zjh.js"></script>
</body>
</html>
