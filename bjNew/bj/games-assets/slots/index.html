<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>经典水果机</title>
  <link rel="stylesheet" href="../../client-app/assets/css/common.css">
  <link rel="stylesheet" href="./css/slt.css?v=5">
</head>
<body class="slt-body slt-body--splash">

<div class="slt-splash" id="sltSplash">
  <img class="slt-splash__bg" src="./assets/splash.png?v=3" alt="" draggable="false">
  <div class="slt-splash__action">
    <div class="slt-splash__load" id="splashLoad">
      <div class="slt-splash__load-track" aria-hidden="true">
        <div class="slt-splash__load-bar" id="splashBar"></div>
      </div>
      <span class="slt-splash__load-pct" id="splashPct">0%</span>
    </div>
    <button type="button" class="slt-splash__start" id="splashStart" hidden>开始游戏</button>
  </div>
</div>

<div class="slt-room" id="sltRoom" hidden>
  <div class="slt-bg" aria-hidden="true"></div>
  <button type="button" class="slt-back" id="backBtn" aria-label="返回"></button>

  <header class="slt-top">
    <div class="slt-top-banner">
      <span class="slt-top-banner__text">经典水果机</span>
      <span class="slt-top-banner__sub">跑灯玩法 · 押中即赢</span>
    </div>
  </header>

  <main class="slt-stage">
    <div class="slt-machine">
      <div class="slt-machine__play-bg" aria-hidden="true"></div>
      <div class="slt-ring" id="ring" aria-label="符号灯盘"></div>
      <img class="slt-machine__frame" src="./assets/machine-frame.png?v=3" alt="" draggable="false">
      <div class="slt-center">
        <div class="slt-center__panel" aria-hidden="true"></div>
        <div class="slt-center__info">
          <p class="slt-center__title" id="centerTitle">请押注</p>
          <p class="slt-center__sub" id="centerSub">点击下方水果键</p>
        </div>
      </div>
      <div class="slt-light" id="lightDot" hidden aria-hidden="true">
        <img src="./assets/light-dot.png?v=3" alt="" draggable="false">
      </div>
    </div>
    <p class="slt-result" id="resultText"></p>
  </main>

  <div class="slt-foot">
    <div class="slt-mid-band">
      <!-- 统计栏底图改 CSS，避免 AI 黑底块 -->
      <div class="slt-mid-stats">
        <div class="slt-stat-pod">
          <img class="slt-stat-pod__icon" src="./assets/icon-wallet.png?v=3" alt="">
          <span class="slt-stat-pod__val" id="statBalance">0</span>
        </div>
        <div class="slt-stat-pod is-bet">
          <img class="slt-stat-pod__icon" src="./assets/icon-coin.png?v=3" alt="">
          <span class="slt-stat-pod__val" id="statBet">0</span>
        </div>
        <div class="slt-stat-pod">
          <img class="slt-stat-pod__icon" src="./assets/icon-prize.png?v=3" alt="">
          <span class="slt-stat-pod__val" id="statWin">0</span>
        </div>
      </div>
    </div>

    <div class="slt-bet-keys" id="betKeys" aria-label="押注键"></div>

    <footer class="slt-actions">
      <button type="button" class="slt-act slt-act--clear" id="btnClear">
        <img src="./assets/btn-clear.png?v=3" alt=""><span>清除</span>
      </button>
      <button type="button" class="slt-act slt-act--start" id="btnStart" aria-label="开始">
        <img src="./assets/btn-start.png?v=3" alt="">
      </button>
      <button type="button" class="slt-act slt-act--all" id="btnAllBet">
        <img src="./assets/btn-allbet.png?v=3" alt=""><span>全押</span>
      </button>
      <div class="slt-unit-bet">
        <button type="button" class="slt-unit-bet__btn" id="btnMinus">−</button>
        <span class="slt-unit-bet__val" id="unitBetLabel">10</span>
        <button type="button" class="slt-unit-bet__btn" id="btnPlus">+</button>
      </div>
    </footer>
  </div>
</div>

<div class="slt-sheet-mask" id="sheetMask" hidden></div>
<div class="slt-sheet" id="rulesSheet" hidden>
  <header class="slt-sheet__head">
    <h2>游戏规则</h2>
    <button type="button" class="slt-sheet__x" id="sheetClose">×</button>
  </header>
  <div class="slt-sheet__body" id="sheetBody"></div>
  <footer class="slt-sheet__foot">
    <button type="button" class="slt-sheet__ok" id="sheetOk">知道了</button>
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="../../client-app/assets/js/common.js"></script>
<script src="./js/slt-splash.js?v=3"></script>
<script src="./js/slt.js?v=5"></script>
</body>
</html>
