<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="sbRimGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fff4c2"/>
      <stop offset="25%"  stop-color="#ffe79a"/>
      <stop offset="55%"  stop-color="#d4a040"/>
      <stop offset="100%" stop-color="#6b4f1e"/>
    </linearGradient>
    <linearGradient id="sbRimGoldInner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#d4a040" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#5e431b" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="sbIcon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fff4c2"/>
      <stop offset="40%"  stop-color="#ffe79a"/>
      <stop offset="100%" stop-color="#b8862a"/>
    </linearGradient>
    <radialGradient id="sbInner" cx="50%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#2e1e0e" stop-opacity="0.55"/>
      <stop offset="60%"  stop-color="#0f0a05" stop-opacity="0.78"/>
      <stop offset="100%" stop-color="#080502" stop-opacity="0.88"/>
    </radialGradient>
    <filter id="sbDrop" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.2" stdDeviation="1.2" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <g filter="url(#sbDrop)">
    <circle cx="24" cy="24" r="22" fill="url(#sbInner)"/>
    <circle cx="24" cy="24" r="22" fill="none" stroke="url(#sbRimGold)" stroke-width="2.2"/>
    <circle cx="24" cy="24" r="18.6" fill="none" stroke="url(#sbRimGoldInner)" stroke-width="0.7"/>

    <g fill="url(#sbIcon)">
      <rect x="22.6" y="9.6" width="2.8" height="4.2" rx="0.7"/>
      <rect x="22.6" y="9.6" width="2.8" height="4.2" rx="0.7" transform="rotate(45 24 24)"/>
      <rect x="22.6" y="9.6" width="2.8" height="4.2" rx="0.7" transform="rotate(90 24 24)"/>
      <rect x="22.6" y="9.6" width="2.8" height="4.2" rx="0.7" transform="rotate(135 24 24)"/>
      <rect x="22.6" y="9.6" width="2.8" height="4.2" rx="0.7" transform="rotate(180 24 24)"/>
      <rect x="22.6" y="9.6" width="2.8" height="4.2" rx="0.7" transform="rotate(225 24 24)"/>
      <rect x="22.6" y="9.6" width="2.8" height="4.2" rx="0.7" transform="rotate(270 24 24)"/>
      <rect x="22.6" y="9.6" width="2.8" height="4.2" rx="0.7" transform="rotate(315 24 24)"/>
    </g>

    <circle cx="24" cy="24" r="8.6" fill="url(#sbIcon)"/>
    <circle cx="24" cy="24" r="3.6" fill="url(#sbInner)"/>
    <circle cx="24" cy="24" r="3.6" fill="none" stroke="url(#sbRimGoldInner)" stroke-width="0.6"/>

    <path d="M24 9.6 L24 11.6"
          stroke-opacity="0.7"
          stroke-width="1.0"
          stroke-linecap="round"/>
  </g>
</svg>
