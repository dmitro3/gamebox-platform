<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <defs>
    <linearGradient id="lockGoldStroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe79a"/>
      <stop offset="35%" stop-color="#e6c98a"/>
      <stop offset="70%" stop-color="#c9a566"/>
      <stop offset="100%" stop-color="#7a5d2a"/>
    </linearGradient>
    <linearGradient id="lockBodyFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2a14"/>
      <stop offset="100%" stop-color="#0a0805"/>
    </linearGradient>
    <linearGradient id="lockGoldHi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff4c2" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#fff4c2" stop-opacity="0"/>
    </linearGradient>
    <filter id="lockEmboss" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="0.4" result="b"/>
      <feSpecularLighting in="b" surfaceScale="2" specularConstant="0.9" specularExponent="22" lighting-color="#fff4c2" result="spec">
        <feDistantLight azimuth="135" elevation="50"/>
      </feSpecularLighting>
      <feComposite in="spec" in2="SourceGraphic" operator="in" result="specMask"/>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode in="specMask"/>
      </feMerge>
    </filter>
    <filter id="lockDrop" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0.8" stdDeviation="0.6" flood-color="#000" flood-opacity="0.75"/>
      <feDropShadow dx="0" dy="0" stdDeviation="1.2" flood-color="#d4a040" flood-opacity="0.35"/>
    </filter>
  </defs>
  <g filter="url(#lockDrop)">
    <rect x="4.5" y="10.5" width="15" height="10" rx="2" fill="url(#lockBodyFill)" stroke="url(#lockGoldStroke)" stroke-width="1.6" filter="url(#lockEmboss)"/>
    <path d="M7.5 10.5V7.6a4.5 4.5 0 0 1 9 0v2.9" fill="none" stroke="url(#lockGoldStroke)" stroke-width="1.6" stroke-linecap="round" filter="url(#lockEmboss)"/>
    <circle cx="12" cy="14.6" r="1.3" fill="url(#lockGoldStroke)" filter="url(#lockEmboss)"/>
    <path d="M12 15.7v2.3" stroke="url(#lockGoldStroke)" stroke-width="1.4" stroke-linecap="round" filter="url(#lockEmboss)"/>
    <path d="M6.2 12c.4-.2 1.1-.3 1.6-.2" fill="none" stroke="url(#lockGoldHi)" stroke-width="0.7" stroke-linecap="round" opacity="0.9"/>
    <path d="M8.5 8.4c.5-.5 1.3-.8 2.1-.8" fill="none" stroke="url(#lockGoldHi)" stroke-width="0.7" stroke-linecap="round" opacity="0.9"/>
  </g>
</svg>
