<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="bbRimGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fff4c2"/>
      <stop offset="25%"  stop-color="#ffe79a"/>
      <stop offset="55%"  stop-color="#d4a040"/>
      <stop offset="100%" stop-color="#6b4f1e"/>
    </linearGradient>
    <linearGradient id="bbRimGoldInner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#d4a040" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#5e431b" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="bbChevron" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fff4c2"/>
      <stop offset="40%"  stop-color="#ffe79a"/>
      <stop offset="100%" stop-color="#b8862a"/>
    </linearGradient>
    <radialGradient id="bbInner" cx="50%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#2e1e0e" stop-opacity="0.55"/>
      <stop offset="60%"  stop-color="#0f0a05" stop-opacity="0.78"/>
      <stop offset="100%" stop-color="#080502" stop-opacity="0.88"/>
    </radialGradient>
    <filter id="bbDrop" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.2" stdDeviation="1.2" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <g filter="url(#bbDrop)">
    <circle cx="24" cy="24" r="22" fill="url(#bbInner)"/>
    <circle cx="24" cy="24" r="22" fill="none" stroke="url(#bbRimGold)" stroke-width="2.2"/>
    <circle cx="24" cy="24" r="18.6" fill="none" stroke="url(#bbRimGoldInner)" stroke-width="0.7"/>
    <path d="M28.5 14 L17.5 24 L28.5 34"
          fill="none"
          stroke="url(#bbChevron)"
          stroke-width="3.6"
          stroke-linecap="round"
          stroke-linejoin="round"/>
    <path d="M28.5 14 L17.5 24"
          fill="none"
          stroke="#fff4c2"
          stroke-opacity="0.55"
          stroke-width="1.0"
          stroke-linecap="round"/>
