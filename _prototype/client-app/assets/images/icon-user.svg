<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <defs>
    <linearGradient id="userGoldStroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe79a"/>
      <stop offset="35%" stop-color="#e6c98a"/>
      <stop offset="70%" stop-color="#c9a566"/>
      <stop offset="100%" stop-color="#7a5d2a"/>
    </linearGradient>
    <linearGradient id="userGoldHi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff4c2" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fff4c2" stop-opacity="0"/>
    </linearGradient>
    <filter id="userEmboss" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="0.4" result="b"/>
      <feSpecularLighting in="b" surfaceScale="2" specularConstant="0.9" specularExponent="22" lighting-color="#fff4c2" result="spec">
        <feDistantLight azimuth="135" elevation="50"/>
      </feSpecularLighting>
      <feComposite in="spec" in2="SourceGraphic" operator="in" result="specMask"/>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode in="specMask"/>
      </feMerge>
    </filter>
    <filter id="userDrop" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0.8" stdDeviation="0.6" flood-color="#000" flood-opacity="0.75"/>
      <feDropShadow dx="0" dy="0" stdDeviation="1.2" flood-color="#d4a040" flood-opacity="0.35"/>
    </filter>
  </defs>
  <g filter="url(#userDrop)">
    <g fill="none" stroke="url(#userGoldStroke)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" filter="url(#userEmboss)">
      <circle cx="12" cy="8.6" r="3.6"/>
      <path d="M4.2 19.8c.9-3.7 4-5.9 7.8-5.9s6.9 2.2 7.8 5.9"/>
    </g>
    <path d="M11 5.5c.6-.4 1.4-.6 2-.5" fill="none" stroke="url(#userGoldHi)" stroke-width="0.8" stroke-linecap="round" opacity="0.85"/>
  </g>
</svg>
