<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>明 细</title>
  <link rel="stylesheet" href="../../assets/css/common.css">
  <link rel="stylesheet" href="./flow.css">
</head>
<body class="deco-bg">
<div class="screen-deco" aria-hidden="true">
  <img class="cd cd-tl" src="../../assets/images/corner-flourish.png" alt="">
  <img class="cd cd-tr" src="../../assets/images/corner-flourish.png" alt="">
  <img class="cd cd-bl" src="../../assets/images/corner-flourish.png" alt="">
  <img class="cd cd-br" src="../../assets/images/corner-flourish.png" alt="">
</div>


<div class="page detail-page">

  <div class="app-bar">
    <div class="back" id="backBtn">‹</div>
    <div class="title">明 细</div>
    <div class="right"></div>
  </div>

  <div class="page-body">

    <h1 class="detail-title">明 细</h1>

    <!-- 顶部两个 tab 按钮 -->
    <div class="detail-tabs">
      <button type="button" class="dt-tab active" data-tab="settled">今 日 已 结</button>
      <button type="button" class="dt-tab"        data-tab="unsettled">未 结 明 细</button>
    </div>

    <!-- 4 列表格：期号 / 游戏类型 / 下注金额 / 结果 -->
    <div class="detail-table">
      <div class="dt-head">
        <div class="dt-col col-issue">期 号</div>
        <div class="dt-col col-game">游戏类型</div>
        <div class="dt-col col-stake">下注金额</div>
        <div class="dt-col col-result">结 果</div>
      </div>
      <div class="dt-body" id="detailBody"></div>
    </div>

    <div class="lobby-spacer"></div>
  </div>

  <!-- 底部 Tab 由 App.mountTabbar() 动态注入 -->

</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="../../assets/js/common.js"></script>
<script src="../../assets/js/flow-data.js"></script>
<script src="./flow.js"></script>

</body>
</html>
