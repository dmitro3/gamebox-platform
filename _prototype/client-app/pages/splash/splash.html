<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>金御汇</title>
  <link rel="stylesheet" href="../../assets/css/common.css">
  <link rel="stylesheet" href="./splash.css">
</head>
<body>

<div class="page splash-page" id="splashPage">

  <!-- ============ 背景金粉光斑 ============ -->
  <div class="sp-bg">
    <span class="sp-spark" style="--x:14%;--y:18%;--d:0s;"></span>
    <span class="sp-spark" style="--x:78%;--y:24%;--d:.4s;"></span>
    <span class="sp-spark" style="--x:32%;--y:62%;--d:.9s;"></span>
    <span class="sp-spark" style="--x:88%;--y:70%;--d:1.3s;"></span>
    <span class="sp-spark" style="--x:54%;--y:36%;--d:1.7s;"></span>
    <span class="sp-spark" style="--x:12%;--y:78%;--d:2.1s;"></span>
  </div>

  <!-- 顶部装饰：双金线 + 菱形 -->
  <div class="sp-top-orn">
    <span class="sp-line"></span>
    <span class="sp-orn">◆ ◆ ◆</span>
    <span class="sp-line"></span>
  </div>

  <!-- 中心 Logo 区 -->
  <div class="sp-center">

    <!-- 中心金质浮雕奖章（AI 生成 PS 级写实 · PNG 透明背景） -->
    <div class="sp-logo">
      <span class="sp-logo-ring-outer"></span>
      <img class="sp-logo-img" src="../../assets/images/splash-medal.png" alt="">
    </div>

    <!-- 主标题"金 御 汇"（三字逐字浮现） -->
    <div class="sp-title">
      <span style="--i:0">金</span>
      <span style="--i:1">御</span>
      <span style="--i:2">汇</span>
    </div>

    <!-- 英文小副标 -->
    <div class="sp-en">G O L D &nbsp;·&nbsp; H U B</div>

    <!-- 装饰横线 -->
    <div class="sp-divider">
      <span class="spd-l"></span>
      <span class="spd-dot">◆</span>
      <span class="spd-r"></span>
    </div>

    <!-- 标语 -->
    <div class="sp-slogan">汇&nbsp;&nbsp;友&nbsp;&nbsp;即&nbsp;&nbsp;金&nbsp;&nbsp;途</div>

  </div>

  <!-- 底部进度条 + 版本号 -->
  <div class="sp-bottom">
    <div class="sp-bar-wrap">
      <div class="sp-bar" id="spBar"></div>
    </div>
    <div class="sp-tip">
      <span class="sp-tip-text" id="spTip">载 入 中</span>
      <span class="sp-tip-dot">·</span>
      <span class="sp-version">v0.1.0</span>
    </div>
  </div>

  <!-- 底部"点击任意位置进入"提示（延迟出现） -->
  <div class="sp-skip" id="spSkip">点 击 屏 幕 任 意 位 置 进 入</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="../../assets/js/common.js"></script>
<script src="./splash.js"></script>

</body>
</html>
