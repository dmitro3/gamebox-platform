<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>金御汇 · 注册账号</title>
  <link rel="stylesheet" href="../../assets/css/common.css">
  <link rel="stylesheet" href="../welcome/welcome.css">
  <link rel="stylesheet" href="./register.css">
</head>
<body class="deco-bg">

<!-- 屏幕级装饰层：皇冠铺底 + 四角卷草恒定贴合真实屏幕四角，换屏幕尺寸绝不位移 -->
<div class="screen-deco" aria-hidden="true">
  <img class="crown-deco" src="../../assets/images/crown-emblem.png" alt="">
  <img class="cd cd-tl" src="../../assets/images/corner-flourish.png" alt="">
  <img class="cd cd-tr" src="../../assets/images/corner-flourish.png" alt="">
  <img class="cd cd-bl" src="../../assets/images/corner-flourish.png" alt="">
  <img class="cd cd-br" src="../../assets/images/corner-flourish.png" alt="">
</div>

<div class="page register-page">

  <!-- 顶栏：左上角返回键 + GOLD HUB 品牌字标 -->
  <div class="app-bar">
    <div class="back" onclick="history.back()">‹</div>
    <div class="title">
      <span class="brand-dot"></span>
      <span class="brand-wordmark">GOLD&nbsp;HUB</span>
    </div>
    <div class="right"></div>
  </div>

  <div class="page-body">

    <div class="welcome-hero register-hero">
      <div class="hero-medal" aria-hidden="true">
        <span class="hero-medal-ring"></span>
        <img class="hero-medal-img" src="../../assets/images/splash-medal.png" alt="">
      </div>
      <h1 class="hero-title" aria-label="金御汇">
        <span>金</span><span>御</span><span>汇</span>
      </h1>
      <div class="luxe-divider hero-divider"><span></span>◆<span></span></div>
      <div class="hero-en">G O L D &nbsp;·&nbsp; H U B</div>
    </div>

    <form class="register-form" onsubmit="return false;">

      <div class="field-luxe">
        <span class="ic" aria-hidden="true"><img src="../../assets/images/icon-user.svg" alt=""></span>
        <input type="text" class="field" id="account" placeholder="账号（8 位以上，英文+数字）" maxlength="20" autocomplete="username">
      </div>

      <div class="field-luxe">
        <span class="ic" aria-hidden="true"><img src="../../assets/images/icon-lock.svg" alt=""></span>
        <input type="password" class="field" id="password" placeholder="设置密码（6 位以上）" maxlength="20" autocomplete="new-password">
      </div>

      <div class="field-luxe">
        <span class="ic" aria-hidden="true"><img src="../../assets/images/icon-lock.svg" alt=""></span>
        <input type="password" class="field" id="password2" placeholder="再次输入密码" maxlength="20" autocomplete="new-password">
      </div>

      <div class="register-actions">
        <button class="btn btn-primary btn-block" id="btnRegister">
          <span class="ruby ruby-l"></span>
          <span class="btn-text">立 即 注 册</span>
          <span class="ruby ruby-r"></span>
        </button>
      </div>

      <div class="register-extra">
        已有账号？<a href="../welcome/welcome.html">直接登录 →</a>
      </div>

    </form>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="../../assets/js/common.js"></script>
<script src="./register.js"></script>

</body>
</html>
