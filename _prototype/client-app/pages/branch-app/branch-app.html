<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>分享好友</title>
  <link rel="stylesheet" href="../../assets/css/common.css">
  <link rel="stylesheet" href="./branch-app.css">
</head>
<body class="deco-bg">
<div class="screen-deco" aria-hidden="true">
  <img class="cd cd-tl" src="../../assets/images/corner-flourish.png" alt="">
  <img class="cd cd-tr" src="../../assets/images/corner-flourish.png" alt="">
  <img class="cd cd-bl" src="../../assets/images/corner-flourish.png" alt="">
  <img class="cd cd-br" src="../../assets/images/corner-flourish.png" alt="">
</div>

<div class="page ba-page">
  <div class="app-bar">
    <div class="back" id="backBtn">‹</div>
    <div class="title">分 享 好 友</div>
    <div class="right"></div>
  </div>

  <div class="page-body">
    <h1 class="ba-title">分 享 好 友</h1>

    <div class="ba-card">
      <p class="ba-hint">APP 下 载</p>
      <div class="ba-qr-wrap">
        <canvas id="qrCanvas" class="ba-qr" aria-label="APP下载二维码"></canvas>
      </div>
    </div>

    <div class="ba-copy-card">
      <div class="ba-copy-row">
        <input type="text" class="ba-copy-input" id="linkText" readonly aria-label="下载链接">
        <button type="button" class="ba-copy-btn" id="copyBtn">复 制</button>
      </div>
    </div>

    <button type="button" class="ba-save-btn" id="saveBtn">保存</button>

    <div class="lobby-spacer"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
<script src="../../assets/js/common.js"></script>
<script src="./branch-app.js"></script>
</body>
</html>
