<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>账号管理</title>
  <link rel="stylesheet" href="../../assets/css/common.css">
  <link rel="stylesheet" href="./account-manage.css">
</head>
<body class="deco-bg">
<div class="screen-deco" aria-hidden="true">
  <img class="cd cd-tl" src="../../assets/images/corner-flourish.png" alt="">
  <img class="cd cd-tr" src="../../assets/images/corner-flourish.png" alt="">
  <img class="cd cd-bl" src="../../assets/images/corner-flourish.png" alt="">
  <img class="cd cd-br" src="../../assets/images/corner-flourish.png" alt="">
</div>

<div class="page am-page">
  <div class="app-bar">
    <div class="back" id="backBtn">‹</div>
    <div class="title">账号管理</div>
    <div class="right"></div>
  </div>

  <div class="page-body">
    <h1 class="am-title">账 号 管 理</h1>

    <div class="am-list">
      <div class="am-row" data-key="avatar">
        <span class="am-label">个 人 头 像</span>
        <div class="am-value">
          <img id="curAvatar" class="am-avatar" alt="">
          <span class="am-arrow">›</span>
        </div>
      </div>
      <div class="am-row" data-key="nickname">
        <span class="am-label">修 改 昵 称</span>
        <div class="am-value">
          <span class="am-text" id="curNickname">———</span>
          <span class="am-arrow">›</span>
        </div>
      </div>
      <div class="am-row" data-key="password">
        <span class="am-label">修 改 密 码</span>
        <div class="am-value">
          <span class="am-text-muted">前往修改</span>
          <span class="am-arrow">›</span>
        </div>
      </div>
      <div class="am-row" data-key="sound">
        <span class="am-label">点 击 音 效</span>
        <div class="am-value">
          <label class="am-switch">
            <input type="checkbox" id="soundSwitch">
            <span class="am-switch-track"><span class="am-switch-thumb"></span></span>
          </label>
        </div>
      </div>
      <div class="am-row" data-key="bgm">
        <span class="am-label">背 景 音 乐</span>
        <div class="am-value">
          <label class="am-switch">
            <input type="checkbox" id="bgmSwitch">
            <span class="am-switch-track"><span class="am-switch-thumb"></span></span>
          </label>
        </div>
      </div>
    </div>

    <div class="lobby-spacer"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="../../assets/js/common.js"></script>
<script src="./account-manage.js"></script>
</body>
</html>
