<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>系统维护中</title>
  <link rel="stylesheet" href="../../assets/css/common.css">
  <link rel="stylesheet" href="../../assets/css/status-page.css">
</head>
<body>

<!--
  系统维护中 - 被动跳转用
  支持 URL 参数：
    ?endAt=2026-05-29T23:30:00       维护结束时间 ISO（默认 30 分钟后）
    ?reason=自定义副文
-->
<div class="status-page is-maintenance">

  <div class="sp-icon-wrap">
    <div class="sp-icon">
      <svg viewBox="0 0 64 64" aria-hidden="true">
        <!-- 大金色齿轮 -->
        <circle cx="32" cy="32" r="10"/>
        <circle cx="32" cy="32" r="4" fill="currentColor"/>
        <!-- 8 个齿（向外伸出） -->
        <path d="M32 6 V14 M32 50 V58
                 M6 32 H14 M50 32 H58
                 M14 14 L20 20 M44 44 L50 50
                 M14 50 L20 44 M44 20 L50 14"/>
      </svg>
    </div>
  </div>

  <div class="sp-title">系 统 维 护 中</div>
  <div class="sp-sub" id="spSub">
    为 给 您 提 供 更 优 质 的 服 务 ， 平 台 正 在 升 级 维 护
  </div>

  <div class="sp-meta">
    <div class="sp-meta-label">距 维 护 结 束 还 有</div>
    <div class="sp-countdown" id="spCountdown">
      <span id="cdH">00</span><span class="sp-cd-unit">时</span>
      <span id="cdM">00</span><span class="sp-cd-unit">分</span>
      <span id="cdS">00</span><span class="sp-cd-unit">秒</span>
    </div>
    <div class="sp-meta-tail">
      预 计 <em id="spEndAt">23:00</em> 维 护 完 成
    </div>
  </div>

  <div class="sp-actions">
    <button type="button" class="sp-btn sp-btn-ghost" id="retryBtn">刷 新 重 试</button>
    <button type="button" class="sp-btn sp-btn-primary" id="csBtn">联 系 客 服</button>
  </div>

  <div class="sp-footer">
    维 护 期 间 无 法 进 入 游 戏 ， 已 在 牌 局 内 可 正 常 完 成 本 局 <em>v0.1.0</em>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="../../assets/js/common.js"></script>
<script src="./maintenance.js"></script>

</body>
</html>
