<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>金御汇 · 登录</title>
  <link rel="stylesheet" href="../../assets/css/common.css">
  <link rel="stylesheet" href="./welcome.css">
</head>
<body class="deco-bg welcome-login">

<!-- 屏幕级装饰层：皇冠铺底 + 四角卷草恒定贴合真实屏幕四角，换屏幕尺寸绝不位移 -->
<div class="screen-deco" aria-hidden="true">
  <img class="crown-deco" src="../../assets/images/crown-emblem.png" alt="">
  <img class="cd cd-tl" src="../../assets/images/corner-flourish.png" alt="">
  <img class="cd cd-tr" src="../../assets/images/corner-flourish.png" alt="">
  <img class="cd cd-bl" src="../../assets/images/corner-flourish.png" alt="">
  <img class="cd cd-br" src="../../assets/images/corner-flourish.png" alt="">
</div>

<div class="page welcome-page">

  <!-- 顶部品牌栏：左侧 wordmark / 右侧 汉堡 -->
  <div class="brand-bar">
    <div class="brand">
      <span class="brand-dot"></span>
      <span class="brand-wordmark">GOLD&nbsp;HUB</span>
    </div>
    <div class="menu-btn" id="menuBtn" aria-label="菜单">
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- 右上角弹出菜单（顺序：代理登录 → 房主登录 → 关于） -->
  <div class="menu-popover" id="menuPopover">
    <div class="menu-item" data-action="proxy-login">
      <span class="ic">⚜</span>
      <span class="lb">代理登录</span>
      <span class="arrow">›</span>
    </div>
    <div class="menu-item" data-action="agent-login">
      <span class="ic">♛</span>
      <span class="lb">房主登录</span>
      <span class="arrow">›</span>
    </div>
    <div class="menu-item" data-action="about">
      <span class="ic">ⓘ</span>
      <span class="lb">关于</span>
      <span class="arrow">›</span>
    </div>
  </div>

  <!-- 主体 -->
  <div class="welcome-body">

    <div class="welcome-hero">
      <div class="hero-medal" aria-hidden="true">
        <span class="hero-medal-ring"></span>
        <img class="hero-medal-img" src="../../assets/images/splash-medal.png" alt="">
      </div>
      <h1 class="hero-title" aria-label="金御汇">
        <span>金</span><span>御</span><span>汇</span>
      </h1>
      <div class="luxe-divider hero-divider"><span></span>◆<span></span></div>
      <div class="hero-en">G O L D &nbsp;·&nbsp; H U B</div>
    </div>

    <form class="welcome-form" onsubmit="return false;">

      <div class="field-luxe">
        <span class="ic" aria-hidden="true"><img src="../../assets/images/icon-user.svg" alt=""></span>
        <input type="text" class="field" id="account" placeholder="账号" maxlength="20" autocomplete="username">
      </div>

      <div class="field-luxe">
        <span class="ic" aria-hidden="true"><img src="../../assets/images/icon-lock.svg" alt=""></span>
        <input type="password" class="field" id="password" placeholder="密码" maxlength="30" autocomplete="current-password">
      </div>

      <!-- 记住密码：勾选后下次自动回填账号 + 密码（localStorage 存储，仅本机有效） -->
      <div class="welcome-options">
        <label class="remember-row">
          <input type="checkbox" id="rememberMe">
          <span class="remember-box" aria-hidden="true"></span>
          <span class="remember-label">记 住 密 码</span>
        </label>
      </div>

      <div class="welcome-actions">
        <button class="btn btn-primary btn-block" id="btnLogin">
          <span class="ruby ruby-l"></span>
          <span class="btn-text">登 录</span>
          <span class="ruby ruby-r"></span>
        </button>
        <button class="btn btn-secondary btn-block" id="btnRegister">注 册 账 号</button>
      </div>

    </form>

  </div>

  <!-- 底部（精简：只留 GOLDHUB·EST·2026 一行；背景皇冠在注册按钮与此行之间） -->
  <div class="welcome-footer">
    <div class="footer-mark">
      <span>GOLDHUB</span><span class="sep">·</span><span>EST·2026</span>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="../../assets/js/common.js"></script>
<script src="./welcome.js"></script>

</body>
</html>
