<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <!-- 禁止浏览器缓存当前 HTML（仅本页：避免新加按钮/新版 CSS 被旧 HTML 覆盖） -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>输入房间号</title>
  <link rel="stylesheet" href="../../assets/css/common.css?v=20260531e">
  <link rel="stylesheet" href="./referral-input.css?v=20260531e">
</head>
<body class="referral-bg">

<!-- 屏幕级装饰层：position:fixed 铺满视口，独立于中间内容的缩放。
     皇冠铺底 + 四角卷草恒定贴合真实屏幕四角，屏幕大小变化时绝不位移。 -->
<div class="screen-deco" aria-hidden="true">
  <img class="crown-deco" src="../../assets/images/crown-emblem.png" alt="">
  <img class="cd cd-tl" src="../../assets/images/corner-flourish.png" alt="">
  <img class="cd cd-tr" src="../../assets/images/corner-flourish.png" alt="">
  <img class="cd cd-bl" src="../../assets/images/corner-flourish.png" alt="">
  <img class="cd cd-br" src="../../assets/images/corner-flourish.png" alt="">
</div>

<!-- 屏幕级 fixed 顶角按钮：钉死真实屏幕角，不参与 .page 的 transform:scale 缩放
     左上角 = 返回（back-button.svg）
     右上最右 = 安全退出（logout-button.svg）
     右上次右 = 个人设置（settings-button.svg，与 back/logout 同款金圈风格） -->
<button class="page-back-fixed" onclick="history.back()" aria-label="返回"></button>
<button class="page-settings-fixed" id="settingsBtn" aria-label="个人设置"></button>
<button class="page-logout-fixed" id="logoutBtn" aria-label="安全退出"></button>

<div class="page referral-page">

  <div class="page-body">

    <!-- 顶部用户详情栏：AI 巴洛克金质电子名片框（顶皇冠/底垂坠/红宝石小耳/卷草外延）
         + AI 金圆头像框 + 平台基本身份（头像/名称/ID）
         这页是"还没进入房间"的中转页，积分/VIP 等都是房间内独立的，进房后再显示 -->
    <div class="user-bar">
      <div class="avatar-luxe-wrap">
        <img id="userAvatar" class="avatar-img" alt="">
        <img class="avatar-frame" src="../../assets/images/avatar-ring.png" alt="">
      </div>

      <div class="user-info">
        <div class="user-name" id="userName">加载中...</div>
        <div class="user-divider"><span class="user-divider-gem"></span></div>
        <div class="user-id">
          <span class="id-dot"></span>ID&nbsp;<span id="userId">———————</span>
        </div>
      </div>
    </div>

    <!-- 房间号输入 -->
    <div class="section-title">
      <span class="orn">◆</span>请 输 入 房 间 号<span class="orn">◆</span>
    </div>

    <div class="code-boxes" id="codeBoxes">
      <input type="tel" class="code-box" maxlength="1" inputmode="numeric" data-idx="0">
      <input type="tel" class="code-box" maxlength="1" inputmode="numeric" data-idx="1">
      <input type="tel" class="code-box" maxlength="1" inputmode="numeric" data-idx="2">
      <input type="tel" class="code-box" maxlength="1" inputmode="numeric" data-idx="3">
      <input type="tel" class="code-box" maxlength="1" inputmode="numeric" data-idx="4">
      <input type="tel" class="code-box" maxlength="1" inputmode="numeric" data-idx="5">
    </div>

    <!-- 已通过房间网格 -->
    <div class="rooms-section" id="roomsSection">
      <div class="section-title">
        <span class="orn">◆</span>恭 迎 归 来 · 棋 局 再 续<span class="orn">◆</span>
      </div>
      <div class="rooms-grid" id="roomsGrid"></div>
    </div>

    <!-- 主操作 -->
    <button class="btn btn-primary btn-block" id="btnApply">
      <span class="ruby ruby-l"></span>
      <span class="btn-text">进 入 房 间</span>
      <span class="ruby ruby-r"></span>
    </button>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="../../assets/js/common.js?v=20260531e"></script>
<script src="./referral-input.js?v=20260531e"></script>

</body>
</html>
