<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>游戏大厅</title>
  <link rel="stylesheet" href="../../assets/css/common.css">
  <link rel="stylesheet" href="./game-lobby.css">
</head>
<body class="lobby-bg">
<!-- 大厅专属屏幕级装饰层（与「输入房间号」页 .screen-deco 同款资源 + 同款定位规则，
     但 class 全部 lobby- 前缀，独立于 common.css） -->
<div class="lobby-deco" aria-hidden="true">
  <img class="lobby-deco-crown" src="../../assets/images/crown-emblem.png" alt="">
  <img class="lobby-deco-corner lobby-deco-corner-tl" src="../../assets/images/corner-flourish.png" alt="">
  <img class="lobby-deco-corner lobby-deco-corner-tr" src="../../assets/images/corner-flourish.png" alt="">
  <img class="lobby-deco-corner lobby-deco-corner-bl" src="../../assets/images/corner-flourish.png" alt="">
  <img class="lobby-deco-corner lobby-deco-corner-br" src="../../assets/images/corner-flourish.png" alt="">
</div>


<!-- 屏幕级 fixed 顶角按钮：钉在真实屏幕左上 / 右上角，不被 .page 缩放放大 -->
<button class="lobby-back" onclick="history.back()" aria-label="返回"></button>
<button class="lobby-logout" id="logoutBtn" aria-label="退出登录"></button>

<div class="page lobby-page">

  <div class="page-body">

    <!-- 页面顶部居中标题：金色渐变 · 与三颗 fixed 顶角按钮同水平线
         （顶部头像卡 .lobby-header + 5 颗玻璃球 .lobby-actions 已移除，
          身份信息在进房页 referral-input 显示，快捷入口改放别处） -->
    <h1 class="lobby-title">游 戏 大 厅</h1>

    <!-- ===== 跑马灯：玩家喜报 / 活动推广 / 平台公告（顶部第一行 · 横向无缝滚动） ===== -->
    <div class="lobby-marquee" id="lobbyMarquee">
      <div class="lm-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path d="M3 10v4l7 3V7L3 10z"/>
          <path d="M10 7l8-3v16l-8-3"/>
          <path d="M6 17v2a1.5 1.5 0 0 0 3 0v-1"/>
        </svg>
      </div>
      <div class="lm-track-wrap">
        <div class="lm-track" id="lmTrack"></div>
      </div>
    </div>

    <!-- 游戏列表（一行一张，JS 动态渲染） -->
    <div class="games-list" id="gamesList"></div>

    <!-- 底部留白，避免被固定 tab 遮挡 -->
    <div class="lobby-spacer"></div>
  </div>

  <!-- 底部 Tab 由 App.mountTabbar() 动态注入（统一在所有登录后页面） -->

</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="../../assets/js/common.js"></script>
<script src="./game-lobby.js"></script>

</body>
</html>
