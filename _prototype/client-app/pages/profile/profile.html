<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>个人资料</title>
  <link rel="stylesheet" href="../../assets/css/common.css">
  <link rel="stylesheet" href="./profile.css">
</head>
<body class="deco-bg">
<!-- 屏幕级装饰层（与「输入房间号」页同款）：4 角卷草固定贴屏 -->
<div class="screen-deco" aria-hidden="true">
  <img class="cd cd-tl" src="../../assets/images/corner-flourish.png" alt="">
  <img class="cd cd-tr" src="../../assets/images/corner-flourish.png" alt="">
  <img class="cd cd-bl" src="../../assets/images/corner-flourish.png" alt="">
  <img class="cd cd-br" src="../../assets/images/corner-flourish.png" alt="">
</div>


<div class="page profile-page">

  <div class="app-bar">
    <div class="back" id="backBtn">‹</div>
    <div class="title">个 人 资 料</div>
    <div class="right"></div>
  </div>

  <div class="page-body">

    <!-- 大头像 + 修改提示 -->
    <div class="pf-avatar-section">
      <div class="pf-avatar" id="avatarBox">
        <img id="userAvatar" alt="">
        <div class="pf-avatar-cam" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M4 7h3l2-2h6l2 2h3v12H4z"/>
            <circle cx="12" cy="13" r="3.5"/>
          </svg>
        </div>
      </div>
      <div class="pf-avatar-hint" id="avatarHint">每 日 可 修 改 一 次</div>
      <input type="file" id="avatarInput" accept="image/*" hidden>
    </div>

    <!-- 卡片 1：基本资料（昵称 / 真实姓名 / 性别 / 出生日期） -->
    <div class="pf-card">
      <div class="pf-row" data-field="nickname" data-policy="daily">
        <div class="pf-label">昵 称</div>
        <div class="pf-value" id="valNickname">———</div>
        <div class="pf-side" id="sideNickname"></div>
      </div>
      <div class="pf-row" data-field="realname" data-policy="once">
        <div class="pf-label">真 实 姓 名</div>
        <div class="pf-value pf-empty" id="valRealname">未 填 写</div>
        <div class="pf-side" id="sideRealname"></div>
      </div>
      <div class="pf-row" data-field="gender" data-policy="once">
        <div class="pf-label">性 别</div>
        <div class="pf-value pf-empty" id="valGender">未 填 写</div>
        <div class="pf-side" id="sideGender"></div>
      </div>
      <div class="pf-row" data-field="birthday" data-policy="once">
        <div class="pf-label">出 生 日 期</div>
        <div class="pf-value pf-empty" id="valBirthday">未 填 写</div>
        <div class="pf-side" id="sideBirthday"></div>
      </div>
    </div>

    <!-- 卡片 2：联系方式（手机号 / 邮箱） -->
    <div class="pf-card">
      <div class="pf-row" data-field="phone" data-policy="once">
        <div class="pf-label">手 机 号 码</div>
        <div class="pf-value pf-empty" id="valPhone">未 填 写</div>
        <div class="pf-side" id="sidePhone"></div>
      </div>
      <div class="pf-row" data-field="email" data-policy="once">
        <div class="pf-label">电 子 邮 箱</div>
        <div class="pf-value pf-empty" id="valEmail">未 填 写</div>
        <div class="pf-side" id="sideEmail"></div>
      </div>
    </div>

    <!-- 底部隐私提示（两行居中，仅"联系客服"四个字可点击跳转） -->
    <div class="pf-tips">
      <div class="pf-tips-line">为了您的隐私安全，信息在确认后将无法修改</div>
      <div class="pf-tips-line">
        如需帮助，请&nbsp;&nbsp;<a class="pf-tips-link" id="csLink" role="button">联 系 客 服</a>
      </div>
    </div>

  </div>

  <!-- ===== 字段编辑底部 sheet ===== -->
  <div class="sheet-mask" id="editMask"></div>
  <div class="edit-sheet" id="editSheet" role="dialog" aria-labelledby="editTitle">
    <div class="ds-handle"></div>
    <div class="ds-title" id="editTitle">修 改 资 料</div>
    <div class="edit-body" id="editBody"></div>
    <div class="edit-warn" id="editWarn">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 3l10 18H2z"/>
        <path d="M12 10v5"/>
        <circle cx="12" cy="18" r="0.9" fill="currentColor" stroke="none"/>
      </svg>
      <span>此 信 息 一 旦 确 认 将 无 法 修 改，请 谨 慎 填 写</span>
    </div>
    <div class="ds-actions">
      <button type="button" class="ds-btn ds-cancel" id="editCancel">取 消</button>
      <button type="button" class="ds-btn ds-confirm" id="editConfirm">确 定</button>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="../../assets/js/common.js"></script>
<script src="./profile.js"></script>

</body>
</html>
