<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>在线客服</title>
  <link rel="stylesheet" href="../../assets/css/common.css">
  <link rel="stylesheet" href="./cs.css">
</head>
<body class="deco-bg">
<!-- 屏幕级装饰层（与「输入房间号」页同款）：4 角卷草固定贴屏 -->
<div class="screen-deco" aria-hidden="true">
  <img class="cd cd-tl" src="../../assets/images/corner-flourish.png" alt="">
  <img class="cd cd-tr" src="../../assets/images/corner-flourish.png" alt="">
  <img class="cd cd-bl" src="../../assets/images/corner-flourish.png" alt="">
  <img class="cd cd-br" src="../../assets/images/corner-flourish.png" alt="">
</div>


<div class="page cs-page">

  <div class="app-bar">
    <div class="back" id="backBtn">‹</div>
    <div class="title">在 线 客 服</div>
    <div class="right"></div>
  </div>

  <!-- 页面标题（居中金色，同游戏大厅 / 明细页统一风格） -->
  <h1 class="cs-title">在 线 客 服</h1>

  <!-- 消息区（JS 渲染） -->
  <div class="cs-messages" id="messages"></div>

  <!-- 输入框 + 图片按钮 + 圆形金色发送按钮 -->
  <div class="cs-composer">
    <!-- 图片按钮（点击触发隐藏的 file input） -->
    <button class="cs-plus" id="imgBtn" type="button" aria-label="发送图片">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <rect x="3" y="5" width="18" height="14" rx="2"/>
        <circle cx="8.5" cy="10" r="1.4" fill="currentColor" stroke="none"/>
        <path d="M3 17l5-5 4 4 3-3 6 6"/>
      </svg>
    </button>
    <input type="file" id="imgInput" accept="image/*" hidden>

    <textarea
      class="cs-input"
      id="msgInput"
      rows="1"
      placeholder="输入消息..."
      autocomplete="off"
    ></textarea>

    <button class="cs-send" id="sendBtn" type="button" aria-label="发送">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M3 11.5l18-8-7 19-3-8-8-3z" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <!-- 底部 Tab 由 App.mountTabbar() 动态注入 -->

  <!-- 图片预览大图遮罩（点击客服气泡里的图片时弹出） -->
  <div class="cs-img-viewer" id="imgViewer">
    <img id="imgViewerSrc" alt="">
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="../../assets/js/common.js"></script>
<script src="./cs.js"></script>

</body>
</html>
