<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>暂无数据</title>
  <link rel="stylesheet" href="../../assets/css/common.css">
  <link rel="stylesheet" href="../../assets/css/status-page.css">
</head>
<body>

<!--
  通用空状态页（被动跳转用）
  支持 URL 参数：
    ?title=自定义标题
    ?desc=自定义副文
    ?backText=按钮文案
    ?backUrl=返回路径（不传则 history.back()）
-->
<div class="status-page is-empty">

  <div class="sp-icon-wrap">
    <div class="sp-icon">
      <svg viewBox="0 0 64 64" aria-hidden="true">
        <!-- 大金色"空盒子" -->
        <path d="M10 22 L32 10 L54 22 L54 50 L10 50 Z"/>
        <path d="M10 22 L32 34 L54 22"/>
        <path d="M32 34 V50"/>
        <!-- 中心装饰菱形 -->
        <path d="M28 42 L32 38 L36 42 L32 46 Z" fill="currentColor" opacity="0.6"/>
      </svg>
    </div>
  </div>

  <div class="sp-title" id="spTitle">暂 无 数 据</div>
  <div class="sp-sub" id="spSub">这 里 还 没 有 任 何 内 容 ， 稍 后 再 来 看 看</div>

  <div class="sp-actions">
    <button type="button" class="sp-btn sp-btn-primary" id="backBtn">
      返 回 上 一 页
    </button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="../../assets/js/common.js"></script>
<script src="./empty.js"></script>

</body>
</html>
