<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>积分账变</title>
  <link rel="stylesheet" href="../../assets/css/common.css">
  <link rel="stylesheet" href="./points-log.css">
</head>
<body class="deco-bg">
<div class="screen-deco" aria-hidden="true">
  <img class="cd cd-tl" src="../../assets/images/corner-flourish.png" alt="">
  <img class="cd cd-tr" src="../../assets/images/corner-flourish.png" alt="">
  <img class="cd cd-bl" src="../../assets/images/corner-flourish.png" alt="">
  <img class="cd cd-br" src="../../assets/images/corner-flourish.png" alt="">
</div>

<div class="page pl-page">
  <div class="app-bar">
    <div class="back" id="backBtn">‹</div>
    <div class="title">积分账变</div>
    <div class="right"></div>
  </div>

  <div class="page-body">
    <h1 class="pl-title">积 分 账 变</h1>

    <div class="time-tabs">
      <button class="tt-item active" data-range="today">今 日</button>
      <button class="tt-item"        data-range="yesterday">昨 日</button>
      <button class="tt-item"        data-range="thisweek">本 周</button>
      <button class="tt-item"        data-range="lastweek">上 周</button>
      <button class="tt-item"        data-range="thismonth">本 月</button>
      <button class="tt-item"        data-range="lastmonth">上 个 月</button>
    </div>

    <div class="pl-filter-row">
      <div class="pl-filter-label" id="pickedLabel">全 部</div>
      <button class="pl-filter-btn" id="filterBtn" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 5h18l-7 8v6l-4 2v-8z"/>
        </svg>
        筛 选
      </button>
    </div>

    <div class="pl-list" id="plList"></div>

    <div class="lobby-spacer"></div>
  </div>
</div>

<!-- 筛选 sheet（底部上拉） -->
<div class="pl-sheet-mask hidden" id="sheetMask"></div>
<div class="pl-sheet hidden" id="filterSheet">
  <div class="pl-sheet-head">
    <span class="pl-sheet-title">筛 选 类 型</span>
    <button class="pl-sheet-close" id="sheetClose" type="button">×</button>
  </div>
  <div class="pl-sheet-grid" id="sheetGrid"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="../../assets/js/common.js"></script>
<script src="./points-log.js"></script>
</body>
</html>
