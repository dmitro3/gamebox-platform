# 本地开发依赖：PostgreSQL + Redis
# 启动：docker compose up -d
# 停止：docker compose down（数据保留在卷里）
services:
  postgres:
    image: postgres:15-alpine
    container_name: gamebox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gamebox
      POSTGRES_PASSWORD: gamebox_dev_2026
      POSTGRES_DB: gamebox
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: gamebox-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
