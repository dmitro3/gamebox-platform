# 与仓库根目录 docker-compose.prod.images.yml 保持一致（部署包副本）
services:
  postgres:
    image: postgres:15-alpine
    container_name: gamebox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gamebox
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: gamebox
    volumes:
      - gamebox_pgdata:/var/lib/postgresql/data
    networks: [gamebox]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gamebox -d gamebox']
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    container_name: gamebox-redis
    restart: unless-stopped
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then
        redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD";
      else
        redis-server --appendonly yes;
      fi'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - gamebox_redisdata:/data
    networks: [gamebox]
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 12

  server:
    image: gamebox-server:latest
    container_name: gamebox-server
    restart: unless-stopped
    env_file:
      - server/.env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [gamebox]
    volumes:
      - gamebox_uploads:/repo/server/public/uploads
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3001/api/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  web:
    image: gamebox-web:latest
    container_name: gamebox-web
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "8080:80"
    networks: [gamebox]

networks:
  gamebox:
    driver: bridge

volumes:
  gamebox_pgdata:
  gamebox_redisdata:
  gamebox_uploads:
