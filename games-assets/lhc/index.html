<!DOCTYPE html>
<html lang="zh-CN">
<head>

</head>
<body class="lhc-body lhc-bg">

<div class="lhc-room">
  <div class="lhc-room-glow" aria-hidden="true"></div>
  <!-- ????+?? | ?? 2?2 -->
  <header class="lhc-head">
    <div class="lhc-head__brand">
      <button type="button" class="lhc-head-back" id="backBtn" aria-label="??"></button>
      <h1 class="lhc-head-title">??????????/h1>
    </div>
    <div class="lhc-stats" id="statsBar">
      <div class="lhc-stat"><span class="k">??</span><span class="v" id="statBalance">0</span></div>
      <div class="lhc-stat"><span class="k">??</span><span class="v" id="statWinloss">0</span></div>
      <div class="lhc-stat"><span class="k">??</span><span class="v" id="statTurnover">0</span></div>
      <div class="lhc-stat"><span class="k">??</span><span class="v" id="statRebate">0</span></div>
    </div>
  </header>

  <!-- ???????? ? ????? ????-->
  <section class="lhc-issue-card">
    <div class="lhc-issue-card__left">
      <span class="lbl">??</span>
      <span class="val" id="curIssue">00000000</span>
    </div>

    <div class="lhc-issue-card__mid">
      <div class="lhc-timer" id="countdownBox">
        <svg class="lhc-timer__ring" viewBox="0 0 100 40" preserveAspectRatio="none" aria-hidden="true">
          <rect class="lhc-timer__ring-track" x="1.5" y="1.5" width="97" height="37" rx="5" ry="5" pathLength="1" />
          <rect class="lhc-timer__ring-fill" x="1.5" y="1.5" width="97" height="37" rx="5" ry="5" pathLength="1" />
        </svg>
        <div class="lhc-timer__row">
          <span class="lhc-timer__lbl" id="cdLabel">????/span>
          <span class="lhc-timer__time" id="cdTime">--:--</span>
        </div>
      </div>
    </div>

    <div class="lhc-issue-card__acts">
      <button type="button" class="lhc-issue-btn" id="btnSlip">??</button>
      <button type="button" class="lhc-issue-btn" id="btnLong">??</button>
      <button type="button" class="lhc-issue-btn" id="btnPredict">??</button>
    </div>
  </section>

  <!-- ????? -->
  <section class="lhc-draw-bar" id="drawBar">
    <button type="button" class="lhc-draw-bar__main" id="drawToggle" aria-expanded="false">
      <span class="lhc-draw-bar__issue" id="barIssue">00000000</span>
      <span class="lhc-draw-bar__balls" id="barBalls"></span>
      <span class="lhc-draw-bar__gy" id="barGy">?? ??/span>
      <span class="lhc-draw-bar__arrow" id="drawArrow">??/span>
    </button>
    <div class="lhc-draw-panel" id="drawPanel">
      <div class="lhc-draw-table-wrap">
        <table class="lhc-draw-table">
          <colgroup>
            <col class="col-issue">
            <col class="col-ball" span="7">
            <col class="col-meta" span="3">
          </colgroup>
          <thead>
            <tr>
              <th>??</th>
              <th>??</th><th>??</th><th>??</th><th>??</th><th>??</th><th>??</th>
              <th>??/th>
              <th>??</th>
              <th>??</th>
              <th>??</th>
            </tr>
          </thead>
          <tbody id="drawTableBody"></tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- ???????????? -->
  <main class="lhc-chat" id="chatFeed" role="log" aria-live="polite"></main>

    <!-- ????????/ ?? / ?? / ?? -->
  <aside class="lhc-rail" aria-label="????">
    <button type="button" class="lhc-rail-btn" id="btnCs" title="??">
      <img class="lhc-rail-ic" src="/images/chat-rail/cs.png?v=1" alt="" draggable="false">
      <span class="lhc-rail-lb">??</span>
    </button>
    <button type="button" class="lhc-rail-btn" id="btnRules" title="??">
      <img class="lhc-rail-ic" src="/images/chat-rail/rules.png?v=1" alt="" draggable="false">
      <span class="lhc-rail-lb">??</span>
    </button>
    <button type="button" class="lhc-rail-btn" id="btnRecords" title="??">
      <img class="lhc-rail-ic" src="/images/chat-rail/records.png?v=1" alt="" draggable="false">
      <span class="lhc-rail-lb">??</span>
    </button>
    <button type="button" class="lhc-rail-btn lhc-rail-btn--play" id="btnExpand" title="??">
      <img class="lhc-rail-ic lhc-rail-ic--play" src="/images/chat-rail/play.png?v=1" alt="" draggable="false">
      <span class="lhc-rail-lb">??</span>
    </button>
  </aside>

    <!-- ???????? + / ?? -->
  <footer class="lhc-composer">
    <input type="text" class="lhc-input" id="chatInput" placeholder="请输入竞猜内容" autocomplete="off" enterkeyhint="send">
    <button type="button" class="lhc-composer-btn" id="plusBtn" aria-label="??">
      <img class="lhc-composer-btn__img" id="plusBtnImg" src="/images/chat-rail/plus.png?v=1" alt="" draggable="false">
    </button>
    <button type="button" class="lhc-composer-btn lhc-composer-btn--play" id="btnComposerPlay" title="??" aria-label="??">
      <img class="lhc-composer-btn__img lhc-composer-btn__img--play" src="/images/chat-rail/play.png?v=1" alt="" draggable="false">
    </button>
  </footer>

  <!-- ???? -->
  <div class="lhc-keypad" id="keypad" hidden>
    <div class="lhc-keypad__tools">
      <button type="button" data-cmd="topup">??</button>

  <!-- + ???? ??? 4 ??= 8 ??-->

    <button type="button" data-link="withdraw">??</button>
    <button type="button" data-link="apply-records">????</button>
    <button type="button" data-link="welfare">????</button>
    <button type="button" data-link="bet-records">????</button>
    <button type="button" data-link="flow">????</button>
    <button type="button" data-link="redpack">????</button>
    <button type="button" data-link="points-log">????</button>

  <!-- ???????? ? ??? -->
  <div class="lhc-play-mask" id="playMask" hidden></div>
  <div class="lhc-play-sheet" id="playSheet" hidden>
    <div class="lhc-play-sheet__head">
      <span>????</span>
      <button type="button" id="playSheetClose">?</button>
    </div>
    <div class="lhc-play-sheet__main">
      <nav class="lhc-play-nav" id="playNav" aria-label="????"></nav>

        <div class="lhc-play-panel__sub" id="playSub" hidden></div>
        <div class="lhc-play-panel__grid" id="playGrid"></div>
      </div>
    </div>
    <footer class="lhc-play-sheet__foot">
      <div class="lhc-play-foot__sel">
        <div class="lhc-play-foot__sel-main">???<strong id="playSelected">??/strong> <span class="lhc-play-foot__hint">?????</span></div>
        <button type="button" class="lhc-play-foot__clear" id="playClear">??</button>
      </div>
      <div class="lhc-play-foot__chips" id="playAmountChips"></div>
      <div class="lhc-play-foot__row">
        <button type="button" class="lhc-play-foot__step" id="playAmountMinus" aria-label="??">??/button>
        <input type="number" class="lhc-play-foot__input" id="playAmount" value="100" min="1" inputmode="numeric">

        <button type="button" class="lhc-play-foot__repeat" id="playRepeat">??</button>

</div>

    <div class="lhc-rules-sheet__head">
      <span>????</span>
