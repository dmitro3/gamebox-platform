<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>快乐时时彩</title>
  <link rel="stylesheet" href="/legacy/css/common.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;600;700&display=swap">
  <link rel="stylesheet" href="./css/ssc.css?v=3">
  <script>
    /* 大厅 iframe 嵌入时标记，布局用 100% 跟随容器而非外层 100dvh */
    (function () {
      if (window.parent !== window) {
        document.documentElement.classList.add('ssc-in-iframe');
      }
    })();
  </script>
</head>
<body class="ssc-body ssc-bg">

<div class="ssc-room">
  <div class="ssc-room-glow" aria-hidden="true"></div>
  <!-- 顶：返回+标题 | 统计 2×2 -->
  <header class="ssc-head">
    <div class="ssc-head__brand">
      <button type="button" class="ssc-head-back" id="backBtn" aria-label="返回"></button>
      <h1 class="ssc-head-title">快乐时时彩</h1>
    </div>
    <div class="ssc-stats" id="statsBar">
      <div class="ssc-stat"><span class="k">积分</span><span class="v" id="statBalance">0</span></div>
      <div class="ssc-stat"><span class="k">输赢</span><span class="v" id="statWinloss">0</span></div>
      <div class="ssc-stat"><span class="k">流水</span><span class="v" id="statTurnover">0</span></div>
      <div class="ssc-stat"><span class="k">回水</span><span class="v" id="statRebate">0</span></div>
    </div>
  </header>

  <!-- 期号行：一行 · 期号 + 倒计时 + 按钮 -->
  <section class="ssc-issue-card">
    <div class="ssc-issue-card__top">
      <div class="ssc-issue-card__left">
        <span class="ssc-cur-issue" id="curIssue" title="">--------</span>
      </div>
      <div class="ssc-issue-card__mid">
        <div class="ssc-timer" id="countdownBox">
          <div class="ssc-timer__digits" id="cdDigits" aria-label="倒计时">
            <div class="ssc-timer__group">
              <span class="ssc-timer__cell">0</span>
              <span class="ssc-timer__cell">0</span>
            </div>
            <span class="ssc-timer__sep" aria-hidden="true">:</span>
            <div class="ssc-timer__group">
              <span class="ssc-timer__cell">0</span>
              <span class="ssc-timer__cell">0</span>
            </div>
          </div>
          <span class="ssc-timer__prep" id="cdPrep" hidden>准备中</span>
        </div>
      </div>
      <div class="ssc-issue-card__acts">
        <button type="button" class="ssc-issue-btn" id="btnSlip">注单</button>
        <button type="button" class="ssc-issue-btn" id="btnLong">长龙</button>
        <button type="button" class="ssc-issue-btn" id="btnPredict">预测</button>
      </div>
    </div>
  </section>

  <!-- 开奖下拉栏 -->
  <section class="ssc-draw-bar" id="drawBar">
    <button type="button" class="ssc-draw-bar__main" id="drawToggle" aria-expanded="false">
      <span class="ssc-draw-bar__issue" id="barIssue">--------</span>
      <span class="ssc-draw-bar__balls" id="barBalls"></span>
      <span class="ssc-draw-bar__meta" id="barSummary">---</span>
      <span class="ssc-draw-bar__arrow" id="drawArrow">▼</span>
    </button>
    <div class="ssc-draw-panel" id="drawPanel">
      <div class="ssc-draw-table-wrap">
        <table class="ssc-draw-table">
          <colgroup>
            <col class="col-issue">
            <col class="col-ball" span="5">
            <col class="col-gy">
            <col class="col-lh">
          </colgroup>
          <thead>
            <tr>
              <th>期数</th>
              <th>万</th><th>千</th><th>百</th><th>十</th><th>个</th>
              <th>和值</th>
              <th>斗牛</th>
            </tr>
          </thead>
          <tbody id="drawTableBody"></tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- 聊天主栏：全房间下注信息 -->
  <main class="ssc-chat" id="chatFeed" role="log" aria-live="polite"></main>

    <!-- 右侧浮钮：客服 / 规则 / 记录 / 玩法 -->
  <aside class="ssc-rail" aria-label="快捷操作">
    <button type="button" class="ssc-rail-btn" id="btnCs" title="客服">
      <img class="ssc-rail-ic" src="/images/chat-rail/cs.png?v=1" alt="" draggable="false">
      <span class="ssc-rail-lb">客服</span>
    </button>
    <button type="button" class="ssc-rail-btn" id="btnRules" title="规则">
      <img class="ssc-rail-ic" src="/images/chat-rail/rules.png?v=1" alt="" draggable="false">
      <span class="ssc-rail-lb">规则</span>
    </button>
    <button type="button" class="ssc-rail-btn" id="btnRecords" title="记录">
      <img class="ssc-rail-ic" src="/images/chat-rail/records.png?v=1" alt="" draggable="false">
      <span class="ssc-rail-lb">记录</span>
    </button>
    <button type="button" class="ssc-rail-btn ssc-rail-btn--play" id="btnExpand" title="玩法">
      <img class="ssc-rail-ic ssc-rail-ic--play" src="/images/chat-rail/play.png?v=1" alt="" draggable="false">
      <span class="ssc-rail-lb">玩法</span>
    </button>
  </aside>

    <!-- 底部输入：输入框 + / 玩法 -->
  <footer class="ssc-composer">
    <input type="text" class="ssc-input" id="chatInput" placeholder="玩法/金额，如 十百59/100、万单/梭哈" autocomplete="off" enterkeyhint="send">
    <button type="button" class="ssc-composer-btn" id="plusBtn" aria-label="更多">
      <img class="ssc-composer-btn__img" id="plusBtnImg" src="/images/chat-rail/plus.png?v=1" alt="" draggable="false">
    </button>
    <button type="button" class="ssc-composer-btn ssc-composer-btn--play" id="btnComposerPlay" title="玩法" aria-label="玩法">
      <img class="ssc-composer-btn__img ssc-composer-btn__img--play" src="/images/chat-rail/play.png?v=1" alt="" draggable="false">
    </button>
  </footer>

  <!-- 投注键盘 -->
  <div class="ssc-keypad" id="keypad" hidden>
    <div class="ssc-keypad__tools">
      <button type="button" data-cmd="topup">上分</button>
      <button type="button" data-cmd="cancel">取消</button>
      <button type="button" data-cmd="allin">梭哈</button>
      <button type="button" data-cmd="repeat">重复</button>
      <button type="button" data-cmd="withdraw">下分</button>
    </div>
    <div class="ssc-keypad__grid" id="keyGrid"></div>
  </div>

  <!-- + 菜单：2 行 × 4 列 = 8 项 -->
  <div class="ssc-menu-mask" id="menuMask" hidden></div>
  <div class="ssc-plus-menu" id="plusMenu" hidden>
    <button type="button" data-link="recharge">存款</button>
    <button type="button" data-link="withdraw">取款</button>
    <button type="button" data-link="apply-records">申请记录</button>
    <button type="button" data-link="welfare">自助回水</button>
    <button type="button" data-link="bet-records">竞猜报表</button>
    <button type="button" data-link="flow">回水报表</button>
    <button type="button" data-link="redpack">红包报表</button>
    <button type="button" data-link="points-log">积分账变</button>
  </div>

  <!-- 玩法展开：左玩法名 · 右选项 · 底金额投注 -->
  <div class="ssc-play-mask" id="playMask" hidden></div>
  <div class="ssc-play-sheet" id="playSheet" hidden>
    <div class="ssc-play-sheet__head">
      <span>全部玩法</span>
      <button type="button" id="playSheetClose">×</button>
    </div>
    <div class="ssc-play-sheet__main">
      <nav class="ssc-play-nav" id="playNav" aria-label="玩法分类"></nav>
      <div class="ssc-play-panel">
        <p class="ssc-play-panel__hint" id="playHint"></p>
        <div class="ssc-play-panel__sub" id="playSub" hidden></div>
        <div class="ssc-play-panel__grid" id="playGrid"></div>
      </div>
    </div>
    <footer class="ssc-play-sheet__foot">
      <div class="ssc-play-foot__sel">已选 <strong id="playSelected">—</strong> <span class="ssc-play-foot__hint">（可多选）</span></div>
      <div class="ssc-play-foot__chips" id="playAmountChips"></div>
      <div class="ssc-play-foot__row">
        <button type="button" class="ssc-play-foot__step" id="playAmountMinus" aria-label="减少">−</button>
        <input type="number" class="ssc-play-foot__input" id="playAmount" value="100" min="1" inputmode="numeric">
        <button type="button" class="ssc-play-foot__step" id="playAmountPlus" aria-label="增加">+</button>
        <button type="button" class="ssc-play-foot__submit" id="playSubmit">投注</button>
      </div>
    </footer>
  </div>

  
  <!-- 游戏规则 -->
  <div class="ssc-rules-mask" id="rulesMask" hidden></div>
  <div class="ssc-rules-sheet" id="rulesSheet" hidden>
    <div class="ssc-rules-sheet__head">
      <span>游戏规则</span>
      <button type="button" id="rulesSheetClose" aria-label="关闭">×</button>
    </div>
    <div class="ssc-rules-sheet__body" id="rulesBody"></div>
  </div>

<!-- 长龙统计 -->
  <div class="ssc-long-mask" id="longMask" hidden></div>
  <div class="ssc-long-sheet" id="longSheet" hidden>
    <div class="ssc-long-sheet__handle" aria-hidden="true"></div>
    <div class="ssc-long-sheet__head">
      <div class="ssc-long-sheet__title-wrap">
        <span class="ssc-long-sheet__title">长龙统计</span>
        <span class="ssc-long-sheet__sub" id="longSummary">连续 2 期及以上</span>
      </div>
      <button type="button" id="longSheetClose" aria-label="关闭">×</button>
    </div>
    <div class="ssc-long-sheet__tabs" id="longTabs">
      <button type="button" class="is-active" data-tab="side">两面</button>
      <button type="button" data-tab="lhh">龙虎</button>
      <button type="button" data-tab="niu">斗牛</button>
    </div>
    <div class="ssc-long-sheet__body" id="longBody"></div>
  </div>

  <!-- 智能预测 -->
  <div class="ssc-long-mask" id="predictMask" hidden></div>
  <div class="ssc-long-sheet ssc-predict-sheet" id="predictSheet" hidden>
    <div class="ssc-long-sheet__handle" aria-hidden="true"></div>
    <div class="ssc-long-sheet__head">
      <div class="ssc-long-sheet__title-wrap">
        <span class="ssc-long-sheet__title">智能预测</span>
        <span class="ssc-predict-sheet__issue" id="predictSummary">下一期 · --------</span>
      </div>
      <button type="button" id="predictSheetClose" aria-label="关闭">×</button>
    </div>
    <div class="ssc-long-sheet__tabs" id="predictTabs">
      <button type="button" class="is-active" data-tab="side">双面</button>
      <button type="button" data-tab="digit">号码</button>
      <button type="button" data-tab="shape">形态</button>
    </div>
    <div class="ssc-long-sheet__body" id="predictBody"></div>
    <div class="ssc-predict-foot">基于近期开奖走势统计，仅供参考</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="/legacy/js/games-common.js"></script>
<script src="./js/result-card.js?v=5"></script>
<script src="./js/ssc.js?v=10"></script>
</body>
</html>
