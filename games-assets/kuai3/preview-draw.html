<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1分快三 · 开奖预览</title>
  <link rel="stylesheet" href="/legacy/css/common.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;600;700&display=swap">
  <link rel="stylesheet" href="./css/k3.css?v=37">
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: #080604;
      color: #e8dcc8;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    .k3-preview {
      max-width: 420px;
      margin: 0 auto;
      padding: 20px 16px 32px;
    }
    .k3-preview__head {
      text-align: center;
      margin-bottom: 20px;
    }
    .k3-preview__head h1 {
      margin: 0 0 6px;
      font: 700 18px/1.3 "Noto Serif SC", serif;
      color: #f4d36b;
      letter-spacing: 1px;
    }
    .k3-preview__head p {
      margin: 0;
      font-size: 13px;
      color: #9a8870;
    }
    .k3-preview__stage {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }
    .k3-preview__panel {
      padding: 14px;
      border-radius: 12px;
      background: rgba(22, 17, 11, 0.92);
      border: 1px solid rgba(212, 175, 55, 0.22);
    }
    .k3-preview__row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }
    .k3-preview__row:last-child { margin-bottom: 0; }
    .k3-preview__label {
      flex: 0 0 100%;
      font-size: 11px;
      color: #9a8870;
      letter-spacing: 0.5px;
    }
    .k3-preview__btn {
      flex: 1;
      min-width: calc(50% - 4px);
      padding: 10px 8px;
      border: 1px solid rgba(212, 175, 55, 0.35);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(48, 36, 22, 0.95), rgba(28, 20, 12, 0.98));
      color: #f4d36b;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.12s ease, border-color 0.12s ease;
    }
    .k3-preview__btn:active { transform: scale(0.97); }
    .k3-preview__btn.is-primary {
      flex: 1 1 100%;
      padding: 12px;
      font-size: 15px;
      background: linear-gradient(180deg, #c9a227, #8a6b18);
      color: #1a1208;
      border-color: #e8c84a;
    }
    .k3-preview__btn.is-ghost {
      background: transparent;
      color: #c8a84a;
    }
    .k3-preview__dice-pick {
      display: flex;
      gap: 8px;
      flex: 1;
    }
    .k3-preview__dice-pick select {
      flex: 1;
      padding: 8px 6px;
      border-radius: 8px;
      border: 1px solid rgba(212, 175, 55, 0.3);
      background: #14100a;
      color: #f4d36b;
      font-size: 16px;
      text-align: center;
    }
    .k3-preview__dur {
      display: flex;
      gap: 6px;
      flex: 1;
    }
    .k3-preview__dur label {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 8px 4px;
      border-radius: 8px;
      border: 1px solid rgba(212, 175, 55, 0.25);
      font-size: 12px;
      color: #c8a84a;
      cursor: pointer;
    }
    .k3-preview__dur input { accent-color: #d4af37; }
    .k3-preview__hint {
      margin-top: 12px;
      font-size: 11px;
      color: #6a5a48;
      text-align: center;
      line-height: 1.5;
    }
    .k3-preview__hint code {
      padding: 1px 5px;
      border-radius: 4px;
      background: rgba(212, 175, 55, 0.1);
      color: #c8a84a;
      font-size: 10px;
    }
  </style>
</head>
<body>
  <div class="k3-preview">
    <header class="k3-preview__head">
      <h1>1分快三 · 开奖预览</h1>
      <p>无需进聊天室，直接看摇骰与开奖卡效果</p>
    </header>

    <div class="k3-preview__stage" id="stage"></div>

    <div class="k3-preview__panel">
      <div class="k3-preview__row">
        <button type="button" class="k3-preview__btn is-primary" id="btnRoll">🎲 开始摇骰</button>
      </div>

      <div class="k3-preview__row">
        <span class="k3-preview__label">快捷预设</span>
        <button type="button" class="k3-preview__btn" data-nums="1,1,1">豹子 111</button>
        <button type="button" class="k3-preview__btn" data-nums="4,5,6">顺子 456</button>
        <button type="button" class="k3-preview__btn" data-nums="2,2,5">对子 225</button>
        <button type="button" class="k3-preview__btn" data-nums="1,3,6">杂六 136</button>
        <button type="button" class="k3-preview__btn" data-nums="6,6,5">大 665</button>
        <button type="button" class="k3-preview__btn is-ghost" id="btnRandom">随机点数</button>
      </div>

      <div class="k3-preview__row">
        <span class="k3-preview__label">自定义三颗骰</span>
        <div class="k3-preview__dice-pick">
          <select id="d1" aria-label="骰1"></select>
          <select id="d2" aria-label="骰2"></select>
          <select id="d3" aria-label="骰3"></select>
        </div>
      </div>

      <div class="k3-preview__row">
        <span class="k3-preview__label">动画时长</span>
        <div class="k3-preview__dur">
          <label><input type="radio" name="dur" value="1500"> 1.5 秒（快）</label>
          <label><input type="radio" name="dur" value="4000" checked> 4 秒（标准）</label>
        </div>
      </div>
    </div>

    <p class="k3-preview__hint">
      本地预览地址：<code>/games-assets/kuai3/preview-draw.html</code>
    </p>
  </div>

  <script src="./js/result-card.js?v=37"></script>
  <script>
    (function () {
      const stage = document.getElementById('stage');
      const btnRoll = document.getElementById('btnRoll');
      const btnRandom = document.getElementById('btnRandom');
      const picks = [document.getElementById('d1'), document.getElementById('d2'), document.getElementById('d3')];

      function isTriplet(nums) {
        return nums[0] === nums[1] && nums[1] === nums[2];
      }

      function sumMeta(nums) {
        const sum = nums.reduce(function (a, b) { return a + b; }, 0);
        const triplet = isTriplet(nums);
        var size = '—';
        if (!triplet) size = sum >= 11 ? '大' : '小';
        var parity = sum % 2 ? '单' : '双';
        var text = triplet ? sum + ' 豹' : sum + ' ' + size + ' ' + parity;
        return { sum: sum, text: text };
      }

      function shapeRow(nums) {
        if (isTriplet(nums)) return '豹子';
        var sorted = nums.slice().sort(function (a, b) { return a - b; });
        if (sorted[0] === sorted[1] || sorted[1] === sorted[2]) return '对子';
        if (sorted[2] - sorted[0] === 2 && sorted[1] - sorted[0] === 1) return '顺子';
        return '杂六';
      }

      function randomNums() {
        return [1 + Math.floor(Math.random() * 6), 1 + Math.floor(Math.random() * 6), 1 + Math.floor(Math.random() * 6)];
      }

      function parseNums(raw) {
        return String(raw).split(',').map(function (n) {
          return Math.max(1, Math.min(6, parseInt(n, 10) || 1));
        });
      }

      function readPicks() {
        return picks.map(function (el) { return parseInt(el.value, 10); });
      }

      function setPicks(nums) {
        picks.forEach(function (el, i) { el.value = String(nums[i]); });
      }

      function getDuration() {
        var checked = document.querySelector('input[name="dur"]:checked');
        return checked ? parseInt(checked.value, 10) : 4000;
      }

      function fakeIssue() {
        return String(Date.now()).slice(-10);
      }

      var cardEl = null;

      function mountRolling() {
        stage.innerHTML = K3ResultCard.buildRolling(fakeIssue());
        cardEl = stage.querySelector('.k3-result-card');
      }

      function playRoll(nums) {
        mountRolling();
        var meta = sumMeta(nums);
        var shape = shapeRow(nums);
        K3ResultCard.startRoll(cardEl, nums, fakeIssue(), meta, shape, getDuration());
      }

      function showSettled(nums) {
        var meta = sumMeta(nums);
        var shape = shapeRow(nums);
        stage.innerHTML = K3ResultCard.build(nums, fakeIssue(), meta, shape);
        cardEl = stage.querySelector('.k3-result-card');
        if (cardEl) K3ResultCard.initSettled(cardEl);
      }

      picks.forEach(function (el) {
        for (var n = 1; n <= 6; n++) {
          var opt = document.createElement('option');
          opt.value = String(n);
          opt.textContent = n;
          el.appendChild(opt);
        }
      });

      btnRoll.addEventListener('click', function () {
        playRoll(readPicks());
      });

      btnRandom.addEventListener('click', function () {
        var nums = randomNums();
        setPicks(nums);
        playRoll(nums);
      });

      document.querySelectorAll('[data-nums]').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var nums = parseNums(btn.getAttribute('data-nums'));
          setPicks(nums);
          playRoll(nums);
        });
      });

      var first = randomNums();
      setPicks(first);
      playRoll(first);
    })();
  </script>
</body>
</html>
