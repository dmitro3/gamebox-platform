<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>龙虎斗</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700;900&family=Orbitron:wght@600;700&family=ZCOOL+QingKe+HuangYou&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/lhd-table.css?v=10">
  <script>
    (function () {
      if (window.parent !== window) document.documentElement.classList.add('lhd-in-iframe');
      var DESIGN_W = 1024, DESIGN_H = 1536;
      function applyScale() {
        var head = document.querySelector('.lhd-head');
        var headH = head ? head.offsetHeight : 56;
        var availW = window.innerWidth;
        var availH = Math.max(120, window.innerHeight - headH);
        var s = Math.min(1, availW / DESIGN_W, availH / DESIGN_H);
        document.documentElement.style.setProperty('--lhd-scale', String(s));
      }
      window.addEventListener('resize', applyScale);
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', applyScale);
      } else {
        applyScale();
      }
    })();
  </script>
</head>
<body class="lhd-body">

<div class="lhd-viewport">
  <header class="lhd-head">
    <div class="lhd-head__brand">
      <button type="button" class="lhd-head-back" id="backBtn" aria-label="返回"></button>
      <h1 class="lhd-head-title">龙虎斗</h1>
    </div>
    <div class="lhd-stats" id="statsBar">
      <div class="lhd-stat"><span class="k">积分</span><span class="v" id="statBalance">0</span></div>
      <div class="lhd-stat"><span class="k">输赢</span><span class="v" id="statWinloss">0</span></div>
      <div class="lhd-stat"><span class="k">流水</span><span class="v" id="statTurnover">0</span></div>
      <div class="lhd-stat"><span class="k">回水</span><span class="v" id="statRebate">0</span></div>
    </div>
  </header>

  <div class="lhd-stage">
    <div class="lhd-room">
      <div class="lhd-shoe" id="shoeBox" aria-hidden="true">
        <img class="lhd-shoe__body" src="./assets/ui/shoe-dealer-live.png?v=1" alt="" draggable="false">
        <img class="lhd-shoe__cards" src="./assets/ui/shoe-cards-live.png?v=4" alt="" draggable="false">
      </div>

      <div class="lhd-timer" id="timerBox" aria-label="倒计时">
        <span class="lhd-timer__time" id="cdTime">15</span>
      </div>

      <div class="lhd-deal" id="dealArea" aria-label="发牌区">
        <div class="lhd-hand lhd-hand--dragon" id="dragonHand">
          <div class="lhd-card" data-slot="d1">
            <div class="lhd-card__inner">
              <div class="lhd-card__face lhd-card__face--back"><img src="./assets/cards/card-back.png?v=9" alt="" draggable="false"></div>
              <div class="lhd-card__face lhd-card__face--front"><img src="./assets/cards/card-back.png?v=9" alt="" draggable="false"></div>
            </div>
          </div>
          <div class="lhd-hand-type" id="dragonType" hidden></div>
        </div>
        <div class="lhd-hand lhd-hand--tiger" id="tigerHand">
          <div class="lhd-card" data-slot="t1">
            <div class="lhd-card__inner">
              <div class="lhd-card__face lhd-card__face--back"><img src="./assets/cards/card-back.png?v=9" alt="" draggable="false"></div>
              <div class="lhd-card__face lhd-card__face--front"><img src="./assets/cards/card-back.png?v=9" alt="" draggable="false"></div>
            </div>
          </div>
          <div class="lhd-hand-type" id="tigerType" hidden></div>
        </div>
      </div>

      <div class="lhd-fly-layer" id="flyLayer" aria-hidden="true"></div>

      <div class="lhd-bet" id="betArea" aria-label="下注区">
        <button type="button" class="lhd-bet-btn" data-bet="dragon">
          <img class="lhd-bet-btn__frame" src="./assets/ui/bet-btns/dragon.png?v=4" alt="" draggable="false">
          <span class="lhd-bet-btn__name">龙</span>
          <span class="lhd-bet-btn__odds">1:1</span>
          <span class="lhd-bet-btn__chips" aria-hidden="true"></span>
          <span class="lhd-bet-btn__stake" hidden>0</span>
        </button>
        <button type="button" class="lhd-bet-btn" data-bet="tie">
          <img class="lhd-bet-btn__frame" src="./assets/ui/bet-btns/tie.png?v=4" alt="" draggable="false">
          <span class="lhd-bet-btn__name">和</span>
          <span class="lhd-bet-btn__odds">1:8</span>
          <span class="lhd-bet-btn__chips" aria-hidden="true"></span>
          <span class="lhd-bet-btn__stake" hidden>0</span>
        </button>
        <button type="button" class="lhd-bet-btn" data-bet="tiger">
          <img class="lhd-bet-btn__frame" src="./assets/ui/bet-btns/tiger.png?v=4" alt="" draggable="false">
          <span class="lhd-bet-btn__name">虎</span>
          <span class="lhd-bet-btn__odds">1:1</span>
          <span class="lhd-bet-btn__chips" aria-hidden="true"></span>
          <span class="lhd-bet-btn__stake" hidden>0</span>
        </button>
      </div>

      <div class="lhd-roadmap" id="roadmap" aria-label="路单">
        <div class="lhd-roadmap__inner">
          <header class="lhd-roadmap__head">
            <div class="lhd-roadmap__brand">
              <i class="lhd-roadmap__brand-mark" aria-hidden="true"></i>
              <span class="lhd-roadmap__title">路单</span>
            </div>
            <div class="lhd-roadmap__stats" aria-label="统计">
              <div class="lhd-roadmap__stat lhd-roadmap__stat--dragon">
                <span class="lhd-roadmap__pill"><i></i>龙</span>
                <b id="roadD">0</b>
                <em id="roadDpct">0%</em>
              </div>
              <div class="lhd-roadmap__stat lhd-roadmap__stat--tiger">
                <span class="lhd-roadmap__pill"><i></i>虎</span>
                <b id="roadTg">0</b>
                <em id="roadTgpct">0%</em>
              </div>
              <div class="lhd-roadmap__stat lhd-roadmap__stat--tie">
                <span class="lhd-roadmap__pill"><i></i>和</span>
                <b id="roadTie">0</b>
                <em id="roadTiepct">0%</em>
              </div>
              <div class="lhd-roadmap__stat lhd-roadmap__stat--total">
                <span class="lhd-roadmap__pill lhd-roadmap__pill--mute">总局</span>
                <b id="roadN">0</b>
              </div>
            </div>
          </header>
          <div class="lhd-roadmap__body">
            <section class="lhd-roadmap__panel lhd-roadmap__panel--bead">
              <div class="lhd-roadmap__tag">珠盘</div>
              <div class="lhd-roadmap__scroll" id="beadScroll">
                <div class="lhd-roadmap__paper">
                  <div class="lhd-roadmap__grid lhd-roadmap__grid--bead" id="beadGrid" role="list"></div>
                </div>
              </div>
            </section>
            <section class="lhd-roadmap__panel lhd-roadmap__panel--big">
              <div class="lhd-roadmap__tag">大路</div>
              <div class="lhd-roadmap__scroll" id="bigScroll">
                <div class="lhd-roadmap__paper">
                  <div class="lhd-roadmap__grid lhd-roadmap__grid--big" id="bigGrid" role="list"></div>
                </div>
              </div>
            </section>
          </div>
        </div>
      </div>

      <div class="lhd-actions" id="actionBar" aria-label="操作">
        <button type="button" class="lhd-action lhd-action--undo" data-action="undo" aria-label="撤销">
          <img src="./assets/ui/action-btns/undo.png?v=4" alt="撤销" draggable="false">
        </button>
        <button type="button" class="lhd-action lhd-action--rebet" data-action="rebet" aria-label="续押">
          <img src="./assets/ui/action-btns/rebet.png?v=4" alt="续押" draggable="false">
        </button>
      </div>

      <div class="lhd-players" id="playersBox" aria-label="在线人数">
        <img class="lhd-players__icon" src="./assets/ui/action-btns/players.png?v=2" alt="" draggable="false">
        <span class="lhd-players__count" id="playersCount">36</span>
      </div>

      <div class="lhd-chips" id="chipBar" aria-label="筹码">
        <button type="button" class="lhd-chip is-selected" data-chip="1" aria-label="1">
          <span class="lhd-chip__glow" aria-hidden="true"></span>
          <img src="./assets/ui/chips/chip-1.png?v=4" alt="1" draggable="false">
        </button>
        <button type="button" class="lhd-chip" data-chip="5" aria-label="5">
          <span class="lhd-chip__glow" aria-hidden="true"></span>
          <img src="./assets/ui/chips/chip-5.png?v=4" alt="5" draggable="false">
        </button>
        <button type="button" class="lhd-chip" data-chip="10" aria-label="10">
          <span class="lhd-chip__glow" aria-hidden="true"></span>
          <img src="./assets/ui/chips/chip-10.png?v=4" alt="10" draggable="false">
        </button>
        <button type="button" class="lhd-chip" data-chip="50" aria-label="50">
          <span class="lhd-chip__glow" aria-hidden="true"></span>
          <img src="./assets/ui/chips/chip-50.png?v=4" alt="50" draggable="false">
        </button>
        <button type="button" class="lhd-chip" data-chip="100" aria-label="100">
          <span class="lhd-chip__glow" aria-hidden="true"></span>
          <img src="./assets/ui/chips/chip-100.png?v=4" alt="100" draggable="false">
        </button>
        <button type="button" class="lhd-chip" data-chip="500" aria-label="500">
          <span class="lhd-chip__glow" aria-hidden="true"></span>
          <img src="./assets/ui/chips/chip-500.png?v=4" alt="500" draggable="false">
        </button>
        <button type="button" class="lhd-chip-more" id="chipPageBtn" aria-label="切换筹码页" title="切换筹码">
          <span class="lhd-chip-more__dot"></span>
          <span class="lhd-chip-more__dot"></span>
          <span class="lhd-chip-more__dot"></span>
        </button>
      </div>
    </div>
  </div><!-- /.lhd-stage -->
  <div class="lhd-payout-fly" id="payoutFlyLayer" aria-hidden="true"></div>
  <div class="lhd-phase-banner" id="phaseBanner" aria-hidden="true">
    <img class="lhd-phase-banner__img" id="phaseBannerImg" alt="" draggable="false">
  </div>

  <!-- 右侧快捷竖排：客服 / 历史 / 记录 / 玩法 / 设置 -->
  <aside class="lhd-rail" id="lhdRail" aria-label="快捷操作">
    <button type="button" class="lhd-rail-btn" id="railCs" title="客服">
      <img class="lhd-rail-ic" src="/images/table-rail/rail-cs.png?v=3" alt="" draggable="false">
      <span class="lhd-rail-lb">客服</span>
    </button>
    <button type="button" class="lhd-rail-btn" id="railHistory" title="历史记录">
      <img class="lhd-rail-ic" src="/images/table-rail/rail-history.png?v=3" alt="" draggable="false">
      <span class="lhd-rail-lb">历史</span>
    </button>
    <button type="button" class="lhd-rail-btn" id="railRecords" title="下注记录">
      <img class="lhd-rail-ic" src="/images/table-rail/rail-records.png?v=3" alt="" draggable="false">
      <span class="lhd-rail-lb">记录</span>
    </button>
    <button type="button" class="lhd-rail-btn" id="railRules" title="玩法规则">
      <img class="lhd-rail-ic" src="/images/table-rail/rail-rules.png?v=3" alt="" draggable="false">
      <span class="lhd-rail-lb">玩法</span>
    </button>
    <button type="button" class="lhd-rail-btn" id="railSettings" title="设置">
      <img class="lhd-rail-ic" src="/images/table-rail/rail-settings.png?v=3" alt="" draggable="false">
      <span class="lhd-rail-lb">设置</span>
    </button>
  </aside>

  <div class="lhd-sheet-mask" id="lhdSheetMask" hidden></div>
  <section class="lhd-sheet" id="lhdSheet" hidden aria-hidden="true" role="dialog" aria-modal="true">
    <header class="lhd-sheet__head">
      <h2 class="lhd-sheet__title" id="lhdSheetTitle">标题</h2>
      <button type="button" class="lhd-sheet__close" id="lhdSheetClose" aria-label="关闭">&times;</button>
    </header>
    <div class="lhd-sheet__body" id="lhdSheetBody"></div>
  </section>
</div>

<script src="/legacy/js/games-common.js"></script>
<script src="./js/lhd-table.js?v=5"></script>
</body>
</html>
