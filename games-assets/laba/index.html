<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>777 经典拉霸</title>
  <link rel="stylesheet" href="../../client-app/assets/css/common.css">
  <link rel="stylesheet" href="./css/lb.css?v=2">
</head>
<body class="lb-body lb-body--splash">

<div class="lb-splash" id="lbSplash">
  <img class="lb-splash__bg" src="./assets/splash.png?v=1" alt="" draggable="false">
  <div class="lb-splash__action">
    <div class="lb-splash__load" id="splashLoad">
      <div class="lb-splash__load-track" aria-hidden="true">
        <div class="lb-splash__load-bar" id="splashBar"></div>
      </div>
      <span class="lb-splash__load-pct" id="splashPct">0%</span>
    </div>
    <button type="button" class="lb-splash__start" id="splashStart" hidden>开始</button>
  </div>
</div>

<div class="lb-room" id="lbRoom" hidden>
  <div class="lb-bg" aria-hidden="true"></div>
  <button type="button" class="lb-back" id="backBtn" aria-label="返回"></button>

  <header class="lb-top">
    <img class="lb-top-header" src="./assets/top-header.png?v=1" alt="777 经典拉霸" draggable="false">
  </header>

  <aside class="lb-paytable" id="payPanel" aria-label="赔付表">
    <img class="lb-paytable__bg" src="./assets/paytable-panel.png?v=1" alt="" draggable="false" aria-hidden="true">
    <div class="lb-paytable__inner">
      <h2 class="lb-paytable__head">赔付表</h2>
      <ul class="lb-paytable__list" id="payList"></ul>
    </div>
  </aside>

  <main class="lb-stage">
    <div class="lb-machine-stack">
      <img class="lb-machine-frame" src="./assets/machine-frame.png?v=1" alt="" draggable="false">
      <div class="lb-reels-host">
        <img class="lb-arrow lb-arrow--l" src="./assets/arrow-l.png?v=1" alt="" draggable="false" aria-hidden="true">
        <div class="lb-reels-wrap">
          <div class="lb-payline" aria-hidden="true"></div>
          <div class="lb-reels" id="reels" aria-label="转轴"></div>
        </div>
        <img class="lb-arrow lb-arrow--r" src="./assets/arrow-r.png?v=1" alt="" draggable="false" aria-hidden="true">
      </div>
    </div>
    <p class="lb-result" id="resultText"></p>
  </main>

  <div class="lb-foot">
    <div class="lb-mid-band">
      <img class="lb-mid-band__art" src="./assets/bottom-deco.png?v=1" alt="" draggable="false">

      <div class="lb-mid-stats">
        <button type="button" class="lb-stat-pod" id="statPodBalance" title="余额" aria-label="余额">
          <span class="lb-stat-pod__icon lb-stat-pod__icon--wallet" aria-hidden="true"></span>
          <span class="lb-stat-pod__val" id="statBalance">0</span>
        </button>
        <button type="button" class="lb-stat-pod is-bet" id="statPodBet" title="投注设置" aria-label="投注设置">
          <span class="lb-stat-pod__icon lb-stat-pod__icon--coin" aria-hidden="true"></span>
          <span class="lb-stat-pod__val" id="statBet">20</span>
        </button>
        <button type="button" class="lb-stat-pod" id="statPodWin" title="历史记录" aria-label="历史记录">
          <span class="lb-stat-pod__icon lb-stat-pod__icon--prize" aria-hidden="true"></span>
          <span class="lb-stat-pod__val" id="statWin">0</span>
        </button>
      </div>
    </div>

    <footer class="lb-controls" id="controlsBar">
      <div class="lb-controls__viewport">
        <div class="lb-controls__track">
          <div class="lb-controls__panel lb-controls__panel--main">
            <button type="button" class="lb-ctrl lb-ctrl--turbo" id="btnTurbo" title="极速旋转">
              <span class="lb-ctrl__icon lb-ctrl__icon--turbo" aria-hidden="true"></span>
              <span class="lb-ctrl__label">极速</span>
            </button>
            <button type="button" class="lb-ctrl lb-ctrl--bet" id="btnMinus">−</button>
            <button type="button" class="lb-ctrl lb-ctrl--spin" id="btnSpin" aria-label="旋转">
              <img class="lb-spin-face" src="./assets/spin-btn.png?v=1" alt="" draggable="false" width="76" height="76">
              <span class="lb-spin-ring" aria-hidden="true"></span>
            </button>
            <button type="button" class="lb-ctrl lb-ctrl--bet" id="btnPlus">+</button>
            <button type="button" class="lb-ctrl lb-ctrl--auto" id="btnAuto" title="自动旋转">
              <span class="lb-ctrl__icon lb-ctrl__icon--auto" aria-hidden="true"></span>
              <span class="lb-ctrl__auto-count" id="autoCountBadge" hidden></span>
              <span class="lb-ctrl__label">自动</span>
            </button>
            <button type="button" class="lb-ctrl lb-ctrl--menu" id="btnMenu" aria-label="菜单">
              <span class="lb-ctrl__icon lb-ctrl__icon--menu" aria-hidden="true"></span>
            </button>
          </div>
          <nav class="lb-controls__panel lb-controls__panel--menu" id="menuPanel" aria-label="功能菜单">
            <button type="button" class="lb-ctrl lb-ctrl--sub" data-act="exit">
              <span class="lb-ctrl__icon">🚪</span><span class="lb-ctrl__label">退出</span>
            </button>
            <button type="button" class="lb-ctrl lb-ctrl--sub" data-act="pay">
              <span class="lb-ctrl__icon">📊</span><span class="lb-ctrl__label">赔付表</span>
            </button>
            <button type="button" class="lb-ctrl lb-ctrl--sub" data-act="rules">
              <span class="lb-ctrl__icon">📜</span><span class="lb-ctrl__label">规则</span>
            </button>
            <button type="button" class="lb-ctrl lb-ctrl--sub" data-act="history">
              <span class="lb-ctrl__icon">📋</span><span class="lb-ctrl__label">记录</span>
            </button>
            <button type="button" class="lb-ctrl lb-ctrl--sub" data-act="settings">
              <span class="lb-ctrl__icon">⚙</span><span class="lb-ctrl__label">设置</span>
            </button>
            <button type="button" class="lb-ctrl lb-ctrl--sub" data-act="close">
              <span class="lb-ctrl__icon">✕</span><span class="lb-ctrl__label">关闭</span>
            </button>
          </nav>
        </div>
      </div>
    </footer>
  </div>
</div>

<div class="lb-sheet-mask" id="sheetMask" hidden></div>
<div class="lb-sheet" id="sideSheet" hidden>
  <nav class="lb-sheet__tabs" id="sheetTabs">
    <button type="button" class="lb-sheet__tab is-active" data-tab="pay">赔付表</button>
    <button type="button" class="lb-sheet__tab" data-tab="rules">规则</button>
    <button type="button" class="lb-sheet__tab" data-tab="history">记录</button>
    <button type="button" class="lb-sheet__tab" data-tab="settings">设置</button>
  </nav>
  <div class="lb-sheet__content" id="sheetContent"></div>
  <button type="button" class="lb-sheet__close" id="sheetClose">×</button>
</div>

<div class="lb-modal-mask" id="betMask" hidden></div>
<div class="lb-modal" id="betModal" hidden>
  <h3 class="lb-modal__title">投注设置</h3>
  <p class="lb-modal__sub">投注总额</p>
  <ul class="lb-bet-list" id="betList"></ul>
  <div class="lb-modal__actions">
    <button type="button" class="lb-modal__btn lb-modal__btn--outline" id="betMax">最大投注</button>
    <button type="button" class="lb-modal__btn" id="betOk">确定</button>
  </div>
</div>

<div class="lb-modal-mask" id="autoMask" hidden></div>
<div class="lb-modal lb-modal--auto" id="autoModal" hidden>
  <h3 class="lb-modal__title">自动旋转</h3>
  <p class="lb-modal__sub">自动旋转次数</p>
  <div class="lb-auto-counts" id="autoCounts"></div>
  <button type="button" class="lb-modal__btn lb-modal__btn--start" id="autoStart">开始</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="../../client-app/assets/js/common.js"></script>
<script src="./js/lb-splash.js?v=1"></script>
<script src="./js/lb.js?v=2"></script>
</body>
</html>
