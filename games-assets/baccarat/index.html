<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>百家乐</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700;900&family=Orbitron:wght@600;700&family=ZCOOL+QingKe+HuangYou&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/bjl-table.css?v=13">
  <script>
    (function () {
      if (window.parent !== window) document.documentElement.classList.add('bjl-in-iframe');
      var DESIGN_W = 1024, DESIGN_H = 1536;
      function applyScale() {
        var head = document.querySelector('.bjl-head');
        var headH = head ? head.offsetHeight : 56;
        var availW = window.innerWidth;
        var availH = Math.max(120, window.innerHeight - headH);
        var s = Math.min(1, availW / DESIGN_W, availH / DESIGN_H);
        document.documentElement.style.setProperty('--bjl-scale', String(s));
      }
      window.addEventListener('resize', applyScale);
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', applyScale);
      } else {
        applyScale();
      }
    })();
  </script>
</head>
<body class="bjl-body">

<div class="bjl-viewport">
  <header class="bjl-head">
    <div class="bjl-head__brand">
      <button type="button" class="bjl-head-back" id="backBtn" aria-label="返回"></button>
      <h1 class="bjl-head-title">百家乐</h1>
    </div>
    <div class="bjl-stats" id="statsBar">
      <div class="bjl-stat"><span class="k">积分</span><span class="v" id="statBalance">0</span></div>
      <div class="bjl-stat"><span class="k">输赢</span><span class="v" id="statWinloss">0</span></div>
      <div class="bjl-stat"><span class="k">流水</span><span class="v" id="statTurnover">0</span></div>
      <div class="bjl-stat"><span class="k">回水</span><span class="v" id="statRebate">0</span></div>
    </div>
  </header>

  <div class="bjl-stage">
    <div class="bjl-room">
      <div class="bjl-shoe" id="shoeBox" aria-hidden="true">
        <img class="bjl-shoe__body" src="./assets/ui/shoe-dealer-live.png?v=1" alt="" draggable="false">
        <img class="bjl-shoe__cards" src="./assets/ui/shoe-cards-live.png?v=3" alt="" draggable="false">
      </div>

      <div class="bjl-timer" id="timerBox" aria-label="倒计时">
        <span class="bjl-timer__time" id="cdTime">15</span>
      </div>

      <div class="bjl-deal" id="dealArea" aria-label="发牌区">
        <div class="bjl-hand bjl-hand--banker" id="bankerHand">
          <div class="bjl-card" data-slot="b3">
            <div class="bjl-card__inner">
              <div class="bjl-card__face bjl-card__face--back"><img src="./assets/cards/card-back.png?v=6" alt="" draggable="false"></div>
              <div class="bjl-card__face bjl-card__face--front"><img src="./assets/cards/card-back.png?v=6" alt="" draggable="false"></div>
            </div>
          </div>
          <div class="bjl-card" data-slot="b1">
            <div class="bjl-card__inner">
              <div class="bjl-card__face bjl-card__face--back"><img src="./assets/cards/card-back.png?v=6" alt="" draggable="false"></div>
              <div class="bjl-card__face bjl-card__face--front"><img src="./assets/cards/card-back.png?v=6" alt="" draggable="false"></div>
            </div>
          </div>
          <div class="bjl-card" data-slot="b2">
            <div class="bjl-card__inner">
              <div class="bjl-card__face bjl-card__face--back"><img src="./assets/cards/card-back.png?v=6" alt="" draggable="false"></div>
              <div class="bjl-card__face bjl-card__face--front"><img src="./assets/cards/card-back.png?v=6" alt="" draggable="false"></div>
            </div>
          </div>
          <div class="bjl-hand-type" id="bankerType" hidden></div>
        </div>
        <div class="bjl-hand bjl-hand--player" id="playerHand">
          <div class="bjl-card" data-slot="p1">
            <div class="bjl-card__inner">
              <div class="bjl-card__face bjl-card__face--back"><img src="./assets/cards/card-back.png?v=6" alt="" draggable="false"></div>
              <div class="bjl-card__face bjl-card__face--front"><img src="./assets/cards/card-back.png?v=6" alt="" draggable="false"></div>
            </div>
          </div>
          <div class="bjl-card" data-slot="p2">
            <div class="bjl-card__inner">
              <div class="bjl-card__face bjl-card__face--back"><img src="./assets/cards/card-back.png?v=6" alt="" draggable="false"></div>
              <div class="bjl-card__face bjl-card__face--front"><img src="./assets/cards/card-back.png?v=6" alt="" draggable="false"></div>
            </div>
          </div>
          <div class="bjl-card" data-slot="p3">
            <div class="bjl-card__inner">
              <div class="bjl-card__face bjl-card__face--back"><img src="./assets/cards/card-back.png?v=6" alt="" draggable="false"></div>
              <div class="bjl-card__face bjl-card__face--front"><img src="./assets/cards/card-back.png?v=6" alt="" draggable="false"></div>
            </div>
          </div>
          <div class="bjl-hand-type" id="playerType" hidden></div>
        </div>
      </div>

      <div class="bjl-fly-layer" id="flyLayer" aria-hidden="true"></div>

      <div class="bjl-bet" id="betArea" aria-label="下注区">
        <button type="button" class="bjl-bet-btn" data-bet="banker">
          <img class="bjl-bet-btn__frame" src="./assets/ui/bet-btns/banker.png?v=1" alt="" draggable="false">
          <span class="bjl-bet-btn__name">庄</span>
          <span class="bjl-bet-btn__odds">1:0.95</span>
          <span class="bjl-bet-btn__chips" aria-hidden="true"></span>
          <span class="bjl-bet-btn__stake" hidden>0</span>
        </button>
        <button type="button" class="bjl-bet-btn" data-bet="tie">
          <img class="bjl-bet-btn__frame" src="./assets/ui/bet-btns/tie.png?v=1" alt="" draggable="false">
          <span class="bjl-bet-btn__name">和</span>
          <span class="bjl-bet-btn__odds">1:8</span>
          <span class="bjl-bet-btn__chips" aria-hidden="true"></span>
          <span class="bjl-bet-btn__stake" hidden>0</span>
        </button>
        <button type="button" class="bjl-bet-btn" data-bet="player">
          <img class="bjl-bet-btn__frame" src="./assets/ui/bet-btns/player.png?v=1" alt="" draggable="false">
          <span class="bjl-bet-btn__name">闲</span>
          <span class="bjl-bet-btn__odds">1:1</span>
          <span class="bjl-bet-btn__chips" aria-hidden="true"></span>
          <span class="bjl-bet-btn__stake" hidden>0</span>
        </button>
        <button type="button" class="bjl-bet-btn" data-bet="bankerPair">
          <img class="bjl-bet-btn__frame" src="./assets/ui/bet-btns/banker-pair.png?v=1" alt="" draggable="false">
          <span class="bjl-bet-btn__name">庄对</span>
          <span class="bjl-bet-btn__odds">1:11</span>
          <span class="bjl-bet-btn__chips" aria-hidden="true"></span>
          <span class="bjl-bet-btn__stake" hidden>0</span>
        </button>
        <button type="button" class="bjl-bet-btn" data-bet="playerPair">
          <img class="bjl-bet-btn__frame" src="./assets/ui/bet-btns/player-pair.png?v=1" alt="" draggable="false">
          <span class="bjl-bet-btn__name">闲对</span>
          <span class="bjl-bet-btn__odds">1:11</span>
          <span class="bjl-bet-btn__chips" aria-hidden="true"></span>
          <span class="bjl-bet-btn__stake" hidden>0</span>
        </button>
      </div>

      <div class="bjl-roadmap" id="roadmap" aria-label="路单">
        <div class="bjl-roadmap__inner">
          <header class="bjl-roadmap__head">
            <div class="bjl-roadmap__brand">
              <i class="bjl-roadmap__brand-mark" aria-hidden="true"></i>
              <span class="bjl-roadmap__title">路单</span>
            </div>
            <div class="bjl-roadmap__stats" aria-label="统计">
              <div class="bjl-roadmap__stat bjl-roadmap__stat--banker">
                <span class="bjl-roadmap__pill"><i></i>庄</span>
                <b id="roadB">0</b>
                <em id="roadBpct">0%</em>
              </div>
              <div class="bjl-roadmap__stat bjl-roadmap__stat--player">
                <span class="bjl-roadmap__pill"><i></i>闲</span>
                <b id="roadP">0</b>
                <em id="roadPpct">0%</em>
              </div>
              <div class="bjl-roadmap__stat bjl-roadmap__stat--tie">
                <span class="bjl-roadmap__pill"><i></i>和</span>
                <b id="roadT">0</b>
                <em id="roadTpct">0%</em>
              </div>
              <div class="bjl-roadmap__stat bjl-roadmap__stat--total">
                <span class="bjl-roadmap__pill bjl-roadmap__pill--mute">总局</span>
                <b id="roadN">0</b>
              </div>
            </div>
          </header>
          <div class="bjl-roadmap__body">
            <section class="bjl-roadmap__panel bjl-roadmap__panel--bead">
              <div class="bjl-roadmap__tag">珠盘</div>
              <div class="bjl-roadmap__scroll" id="beadScroll">
                <div class="bjl-roadmap__paper">
                  <div class="bjl-roadmap__grid bjl-roadmap__grid--bead" id="beadGrid" role="list"></div>
                </div>
              </div>
            </section>
            <section class="bjl-roadmap__panel bjl-roadmap__panel--big">
              <div class="bjl-roadmap__tag">大路</div>
              <div class="bjl-roadmap__scroll" id="bigScroll">
                <div class="bjl-roadmap__paper">
                  <div class="bjl-roadmap__grid bjl-roadmap__grid--big" id="bigGrid" role="list"></div>
                </div>
              </div>
            </section>
          </div>
        </div>
      </div>

      <div class="bjl-actions" id="actionBar" aria-label="操作">
        <button type="button" class="bjl-action bjl-action--undo" data-action="undo" aria-label="撤销">
          <img src="./assets/ui/action-btns/undo.png?v=4" alt="撤销" draggable="false">
        </button>
        <button type="button" class="bjl-action bjl-action--rebet" data-action="rebet" aria-label="续押">
          <img src="./assets/ui/action-btns/rebet.png?v=4" alt="续押" draggable="false">
        </button>
      </div>

      <div class="bjl-players" id="playersBox" aria-label="在线人数">
        <img class="bjl-players__icon" src="./assets/ui/action-btns/players.png?v=2" alt="" draggable="false">
        <span class="bjl-players__count" id="playersCount">36</span>
      </div>

      <div class="bjl-chips" id="chipBar" aria-label="筹码">
        <button type="button" class="bjl-chip is-selected" data-chip="1" aria-label="1">
          <span class="bjl-chip__glow" aria-hidden="true"></span>
          <img src="./assets/ui/chips/chip-1.png?v=4" alt="1" draggable="false">
        </button>
        <button type="button" class="bjl-chip" data-chip="5" aria-label="5">
          <span class="bjl-chip__glow" aria-hidden="true"></span>
          <img src="./assets/ui/chips/chip-5.png?v=4" alt="5" draggable="false">
        </button>
        <button type="button" class="bjl-chip" data-chip="10" aria-label="10">
          <span class="bjl-chip__glow" aria-hidden="true"></span>
          <img src="./assets/ui/chips/chip-10.png?v=4" alt="10" draggable="false">
        </button>
        <button type="button" class="bjl-chip" data-chip="50" aria-label="50">
          <span class="bjl-chip__glow" aria-hidden="true"></span>
          <img src="./assets/ui/chips/chip-50.png?v=4" alt="50" draggable="false">
        </button>
        <button type="button" class="bjl-chip" data-chip="100" aria-label="100">
          <span class="bjl-chip__glow" aria-hidden="true"></span>
          <img src="./assets/ui/chips/chip-100.png?v=4" alt="100" draggable="false">
        </button>
        <button type="button" class="bjl-chip" data-chip="500" aria-label="500">
          <span class="bjl-chip__glow" aria-hidden="true"></span>
          <img src="./assets/ui/chips/chip-500.png?v=4" alt="500" draggable="false">
        </button>
        <button type="button" class="bjl-chip-more" id="chipPageBtn" aria-label="切换筹码页" title="切换筹码">
          <span class="bjl-chip-more__dot"></span>
          <span class="bjl-chip-more__dot"></span>
          <span class="bjl-chip-more__dot"></span>
        </button>
      </div>
    </div>
  </div><!-- /.bjl-stage -->
  <div class="bjl-payout-fly" id="payoutFlyLayer" aria-hidden="true"></div>
  <div class="bjl-phase-banner" id="phaseBanner" aria-hidden="true">
    <img class="bjl-phase-banner__img" id="phaseBannerImg" alt="" draggable="false">
  </div>

  <!-- 右侧快捷竖排：客服 / 历史 / 记录 / 玩法 / 设置 -->
  <aside class="bjl-rail" id="bjlRail" aria-label="快捷操作">
    <button type="button" class="bjl-rail-btn" id="railCs" title="客服">
      <img class="bjl-rail-ic" src="/images/table-rail/rail-cs.png?v=3" alt="" draggable="false">
      <span class="bjl-rail-lb">客服</span>
    </button>
    <button type="button" class="bjl-rail-btn" id="railHistory" title="历史记录">
      <img class="bjl-rail-ic" src="/images/table-rail/rail-history.png?v=3" alt="" draggable="false">
      <span class="bjl-rail-lb">历史</span>
    </button>
    <button type="button" class="bjl-rail-btn" id="railRecords" title="下注记录">
      <img class="bjl-rail-ic" src="/images/table-rail/rail-records.png?v=3" alt="" draggable="false">
      <span class="bjl-rail-lb">记录</span>
    </button>
    <button type="button" class="bjl-rail-btn" id="railRules" title="玩法规则">
      <img class="bjl-rail-ic" src="/images/table-rail/rail-rules.png?v=3" alt="" draggable="false">
      <span class="bjl-rail-lb">玩法</span>
    </button>
    <button type="button" class="bjl-rail-btn" id="railSettings" title="设置">
      <img class="bjl-rail-ic" src="/images/table-rail/rail-settings.png?v=3" alt="" draggable="false">
      <span class="bjl-rail-lb">设置</span>
    </button>
  </aside>

  <div class="bjl-sheet-mask" id="bjlSheetMask" hidden></div>
  <section class="bjl-sheet" id="bjlSheet" hidden aria-hidden="true" role="dialog" aria-modal="true">
    <header class="bjl-sheet__head">
      <h2 class="bjl-sheet__title" id="bjlSheetTitle">标题</h2>
      <button type="button" class="bjl-sheet__close" id="bjlSheetClose" aria-label="关闭">&times;</button>
    </header>
    <div class="bjl-sheet__body" id="bjlSheetBody"></div>
  </section>
</div>

<script src="/legacy/js/games-common.js"></script>
<script src="./js/bjl-table.js?v=13"></script>
</body>
</html>
