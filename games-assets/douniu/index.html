<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>斗牛</title>
  <link rel="stylesheet" href="../../client-app/assets/css/common.css">
  <link rel="stylesheet" href="./css/dn.css">
</head>
<body class="dn-body dn-bg">

<div class="dn-room">
  <div class="dn-room-glow" aria-hidden="true"></div>
  <!-- 顶：返回+标题 | 统计 2×2 -->
  <header class="dn-head">
    <div class="dn-head__brand">
      <button type="button" class="dn-head-back" id="backBtn" aria-label="返回"></button>
      <h1 class="dn-head-title">斗 牛</h1>
    </div>
    <div class="dn-stats" id="statsBar">
      <div class="dn-stat"><span class="k">积分</span><span class="v" id="statBalance">0</span></div>
      <div class="dn-stat"><span class="k">输赢</span><span class="v" id="statWinloss">0</span></div>
      <div class="dn-stat"><span class="k">流水</span><span class="v" id="statTurnover">0</span></div>
      <div class="dn-stat"><span class="k">回水</span><span class="v" id="statRebate">0</span></div>
    </div>
  </header>

  <!-- 期号卡片：左期数 · 中秒表 · 右按钮 -->
  <section class="dn-issue-card">
    <div class="dn-issue-card__left">
      <span class="lbl">期数</span>
      <span class="val" id="curIssue">00000000</span>
    </div>

    <div class="dn-issue-card__mid">
      <div class="dn-timer" id="countdownBox">
        <svg class="dn-timer__ring" viewBox="0 0 100 40" preserveAspectRatio="none" aria-hidden="true">
          <rect class="dn-timer__ring-track" x="1.5" y="1.5" width="97" height="37" rx="5" ry="5" pathLength="1" />
          <rect class="dn-timer__ring-fill" x="1.5" y="1.5" width="97" height="37" rx="5" ry="5" pathLength="1" />
        </svg>
        <div class="dn-timer__row">
          <span class="dn-timer__lbl" id="cdLabel">距封盘</span>
          <span class="dn-timer__time" id="cdTime">--:--</span>
        </div>
      </div>
    </div>

    <div class="dn-issue-card__acts">
      <button type="button" class="dn-issue-btn" id="btnSlip">注单</button>
      <button type="button" class="dn-issue-btn" id="btnLong">长龙</button>
      <button type="button" class="dn-issue-btn" id="btnPredict">预测</button>
    </div>
  </section>

  <!-- 荷官发牌台：顶部常驻两副牌 + 庄闲位 -->
  <section class="dn-dealer" id="dealerTable" aria-label="发牌台">
    <div class="dn-dealer__shoe-row">
      <div class="dn-shoe" id="shoeCenter">
        <div class="dn-shoe__pile dn-shoe__pile--1" id="shoeDeck1" aria-hidden="true">
          <span class="dn-shoe__card"></span>
          <span class="dn-shoe__card"></span>
          <span class="dn-shoe__card"></span>
          <span class="dn-shoe__card"></span>
          <span class="dn-shoe__card"></span>
        </div>
        <div class="dn-shoe__pile dn-shoe__pile--2" id="shoeDeck2" aria-hidden="true">
          <span class="dn-shoe__card"></span>
          <span class="dn-shoe__card"></span>
          <span class="dn-shoe__card"></span>
          <span class="dn-shoe__card"></span>
          <span class="dn-shoe__card"></span>
        </div>
        <span class="dn-shoe__tag">两副牌 · 104张</span>
      </div>
      <div class="dn-dealer__status" id="dealerStatus">等待开奖</div>
    </div>
    <div class="dn-dealer__zones">
      <div class="dn-deal-zone is-banker" id="zoneBanker">
        <div class="dn-deal-zone__head">
          <span class="dn-deal-zone__lbl">庄</span>
          <span class="dn-deal-zone__niu" id="bankerNiu">—</span>
        </div>
        <div class="dn-deal-zone__slots" id="bankerSlots">
          <div class="dn-deal-slot" data-i="0"></div>
          <div class="dn-deal-slot" data-i="1"></div>
          <div class="dn-deal-slot" data-i="2"></div>
          <div class="dn-deal-slot" data-i="3"></div>
          <div class="dn-deal-slot" data-i="4"></div>
        </div>
      </div>
      <div class="dn-dealer__vs" aria-hidden="true">VS</div>
      <div class="dn-deal-zone is-player" id="zonePlayer">
        <div class="dn-deal-zone__head">
          <span class="dn-deal-zone__lbl">闲</span>
          <span class="dn-deal-zone__niu" id="playerNiu">—</span>
        </div>
        <div class="dn-deal-zone__slots" id="playerSlots">
          <div class="dn-deal-slot" data-i="0"></div>
          <div class="dn-deal-slot" data-i="1"></div>
          <div class="dn-deal-slot" data-i="2"></div>
          <div class="dn-deal-slot" data-i="3"></div>
          <div class="dn-deal-slot" data-i="4"></div>
        </div>
      </div>
    </div>
    <div class="dn-flying-layer" id="flyingLayer" aria-hidden="true"></div>
  </section>

  <!-- 开奖下拉栏 -->
  <section class="dn-draw-bar" id="drawBar">
    <button type="button" class="dn-draw-bar__main" id="drawToggle" aria-expanded="false">
      <span class="dn-draw-bar__issue" id="barIssue">00000000</span>
      <span class="dn-draw-bar__balls" id="barBalls" class="bar-cards"></span>
      <span class="dn-draw-bar__gy" id="barGy">结果 —</span>
      <span class="dn-draw-bar__arrow" id="drawArrow">▼</span>
    </button>
    <div class="dn-draw-panel" id="drawPanel">
      <div class="dn-draw-table-wrap">
        <table class="dn-draw-table">
          <colgroup>
            <col class="col-issue">
            <col class="col-banker">
            <col class="col-player">
            <col class="col-result">
          </colgroup>
          <thead>
            <tr>
              <th>期数</th>
              <th>庄牌型</th><th>闲牌型</th><th>结果</th>
            </tr>
          </thead>
          <tbody id="drawTableBody"></tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- 聊天主栏：全房间下注信息 -->
  <main class="dn-chat" id="chatFeed" role="log" aria-live="polite"></main>

  <!-- 右侧浮钮 -->
  <aside class="dn-rail" aria-label="快捷操作">
    <button type="button" class="dn-rail-btn" id="btnCs" title="客服">
      <span class="dn-rail-icon dn-rail-icon--cs"></span>
      <span class="dn-rail-txt">客服</span>
    </button>
    <button type="button" class="dn-rail-btn" id="btnExpand" title="展开玩法">
      <span class="dn-rail-icon dn-rail-icon--expand"></span>
      <span class="dn-rail-txt">玩法</span>
    </button>
    <button type="button" class="dn-rail-btn" id="btnRedpack" title="红包">
      <span class="dn-rail-icon dn-rail-icon--rp"></span>
      <span class="dn-rail-txt">红包</span>
    </button>
  </aside>

  <!-- 底部输入 -->
  <footer class="dn-composer">
    <input type="text" class="dn-input" id="chatInput" placeholder="如：庄 100、牛一到牛六 50" autocomplete="off" enterkeyhint="send">
    <button type="button" class="dn-plus-btn" id="plusBtn" aria-label="更多">+</button>
  </footer>

  <!-- 投注键盘 -->
  <div class="dn-keypad" id="keypad" hidden>
    <div class="dn-keypad__tools">
      <button type="button" data-cmd="topup">上分</button>
      <button type="button" data-cmd="cancel">取消</button>
      <button type="button" data-cmd="allin">梭哈</button>
      <button type="button" data-cmd="repeat">重复</button>
      <button type="button" data-cmd="withdraw">下分</button>
    </div>
    <div class="dn-keypad__grid" id="keyGrid"></div>
  </div>

  <!-- + 菜单：2 行 × 4 列 = 8 项 -->
  <div class="dn-menu-mask" id="menuMask" hidden></div>
  <div class="dn-plus-menu" id="plusMenu" hidden>
    <button type="button" data-link="recharge">存款</button>
    <button type="button" data-link="withdraw">取款</button>
    <button type="button" data-link="apply-records">申请记录</button>
    <button type="button" data-link="welfare">自助回水</button>
    <button type="button" data-link="bet-records">竞猜报表</button>
    <button type="button" data-link="flow">回水报表</button>
    <button type="button" data-link="redpack">红包报表</button>
    <button type="button" data-link="points-log">积分账变</button>
  </div>

  <!-- 玩法展开 -->
  <div class="dn-play-mask" id="playMask" hidden></div>
  <div class="dn-play-sheet" id="playSheet" hidden>
    <div class="dn-play-sheet__head">
      <span>全部玩法</span>
      <button type="button" id="playSheetClose">×</button>
    </div>
    <div class="dn-play-sheet__body" id="playSheetBody"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="../../client-app/assets/js/common.js"></script>
<script src="./js/dn.js"></script>
</body>
</html>
