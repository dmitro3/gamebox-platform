  <script>
    (function () {
      if (window.parent !== window) document.documentElement.classList.add('zjh-in-iframe');
      var DESIGN_W = 1024, DESIGN_H = 1536;
      function applyScale() {
        var head = document.querySelector('.zjh-head');
        var headH = head ? head.offsetHeight : 56;
        var availW = window.innerWidth;
        var availH = Math.max(120, window.innerHeight - headH);
        var s = Math.min(1, availW / DESIGN_W, availH / DESIGN_H);
        document.documentElement.style.setProperty('--zjh-scale', String(s));
      }
      window.addEventListener('resize', applyScale);
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', applyScale);
      } else {
        applyScale();
      }
    })();
  </script>

<script>
(function () {
  /* 防重复注入：先清旧定时器；成功跑完再打标 */
  if (window.__zjhTickTimer) { clearInterval(window.__zjhTickTimer); window.__zjhTickTimer = null; }
  if (window.__zjhPlayersTimer) { clearInterval(window.__zjhPlayersTimer); window.__zjhPlayersTimer = null; }
  if (window.__zjhBooted) return;

  /* 总周期 60s：下注 + 开奖流程(发牌翻牌报牌≈13s) + 派奖 4s */
  var ROUND_SEC = 60;
  var DRAW_EST_SEC = 13;
  var PAYOUT_SECS = 4;
  var TOTAL = ROUND_SEC - DRAW_EST_SEC - PAYOUT_SECS;
  var BANNER_MS = 1500;
  var FLY_MS = 360;
  var GAP_MS = 140;
  var FLIP_MS = 420;
  var FLIP_GAP_MS = 80;
  var DEAL_HOLD_MS = 240;
  var COLLECT_MS = 420;
  var TO_SCORE_MS = 520;
  var left = TOTAL;
  var payoutLeft = 0;
  var phase = 'bet'; /* bet | draw | payout */
  var roundBusy = false;
  var roundSeq = 0; /* 局序号：作废过期的发牌/报牌链 */
  var betDeadline = 0;
  var payoutDeadline = 0;
  var lastBeatSec = -1;
  var lastRoundResult = null;
  var lastHands = null;
  var timeEl = document.getElementById('cdTime');
  var box = document.getElementById('timerBox');
  var room = document.querySelector('.zjh-room');
  var shoe = document.getElementById('shoeBox');
  var flyLayer = document.getElementById('flyLayer');
  var payoutFlyLayer = document.getElementById('payoutFlyLayer');
  var bankerHand = document.getElementById('bankerHand');
  var playerHand = document.getElementById('playerHand');
  var bankerTypeEl = document.getElementById('bankerType');
  var playerTypeEl = document.getElementById('playerType');

  /* ---------- 翻倍炸金花（YMJH）音效 ---------- */
  var AUDIO_BASE = './assets/audio/yoplay-ymjh/';
  var AUDIO_V = '4';
  var audioUnlocked = false;
  var bgmAudio = null;
  var voiceAudio = null;
  var sfxLastAt = {};
  /* 音频开关（设置弹层控制）：music=背景音乐，sfx=音效+语音 */
  var audioPref = { music: true, sfx: true };
  try {
    var apRaw = JSON.parse(localStorage.getItem('zjh_audio') || 'null');
    if (apRaw && typeof apRaw === 'object') {
      audioPref.music = apRaw.music !== false;
      audioPref.sfx = apRaw.sfx !== false;
    }
  } catch (e) { /* ignore */ }
  function saveAudioPref() {
    try { localStorage.setItem('zjh_audio', JSON.stringify(audioPref)); } catch (e) { /* ignore */ }
  }
  function setMusicOn(on) {
    audioPref.music = !!on;
    saveAudioPref();
    if (audioPref.music) {
      ensureBgm(true);
    } else if (bgmAudio) {
      try { bgmAudio.pause(); } catch (e) { /* ignore */ }
    }
  }
  function setSfxOn(on) {
    audioPref.sfx = !!on;
    saveAudioPref();
    if (!audioPref.sfx && voiceAudio) {
      try { voiceAudio.pause(); } catch (e) { /* ignore */ }
      voiceAudio = null;
    }
  }
  var HAND_VOICE = {
    high: 'voice/high',
    pair: 'voice/pair',
    straight: 'voice/straight',
    flush: 'voice/flush',
    'straight-flush': 'voice/straight-flush',
    leopard: 'voice/leopard'
  };
  /* 按实测 mp3 时长 + 余量；键名必须与 audioUrl 路径一致 */
  var VOICE_MS = {
    'voice/high': 1100,
    'voice/pair': 1300,
    'voice/straight': 1950,
    'voice/flush': 1000,
    'voice/straight-flush': 1200,
    'voice/leopard': 1500,
    'voice/start-bet': 1400,
    'voice/banker-win': 1600,
    'voice/player-win': 1600,
    'voice/tie': 1400
  };

  function audioUrl(name) {
    return AUDIO_BASE + name + '.mp3?v=' + AUDIO_V;
  }

  function unlockAudio() {
    if (audioUnlocked) return;
    audioUnlocked = true;
    try {
      var silent = new Audio(audioUrl('bet'));
      silent.volume = 0;
      silent.play().then(function () {
        silent.pause();

      try {

        node.volume = typeof vol === 'number' ? vol : 1;
        node.onended = finish;

        var p = node.play();

  function buildDeck() {
    var deck = [];
    for (var s = 0; s < SUITS.length; s++) {
      for (var r = 0; r < RANKS.length; r++) {
        deck.push({ suit: SUITS[s], rank: RANKS[r] });
      }
    }
    for (var i = deck.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = deck[i];
      deck[i] = deck[j];
      deck[j] = t;
    }
    return deck;
  }

  function cardValue(rank) {
    if (rank === 'A') return 14;
    if (rank === 'K') return 13;
    if (rank === 'Q') return 12;
    if (rank === 'J') return 11;
    return parseInt(rank, 10);
  }

  function evalHand(cards) {
    var vals = cards.map(function (c) { return cardValue(c.rank); }).sort(function (a, b) { return b - a; });
    var suits = cards.map(function (c) { return c.suit; });
    var isFlush = suits[0] === suits[1] && suits[1] === suits[2];
    var uniq = [];
    for (var i = 0; i < vals.length; i++) {
      if (uniq.indexOf(vals[i]) < 0) uniq.push(vals[i]);
    }
    var sorted = vals.slice().sort(function (a, b) { return a - b; });
    var isStraight = false;
    if (uniq.length === 3) {
      isStraight = sorted[2] - sorted[1] === 1 && sorted[1] - sorted[0] === 1;
      if (!isStraight && sorted.join(',') === '2,3,14') isStraight = true;
    }
    if (uniq.length === 1) return { type: 'leopard', label: '豹子', score: 6, vals: vals };
    if (isFlush && isStraight) return { type: 'straight-flush', label: '顺金', score: 5, vals: vals };
    if (isFlush) return { type: 'flush', label: '金花', score: 4, vals: vals };
    if (isStraight) {
      var svals = (sorted.join(',') === '2,3,14') ? [3, 2, 1] : vals;
      return { type: 'straight', label: '顺子', score: 3, vals: svals };
    }
    if (uniq.length === 2) {
      var pairVal = (vals[0] === vals[1]) ? vals[0] : vals[1];
      var kicker = (vals[0] === vals[1]) ? vals[2] : vals[0];
      return { type: 'pair', label: '对子', score: 2, vals: [pairVal, kicker, 0] };
    }
    return { type: 'high', label: '散牌', score: 1, vals: vals };
  }

  function compareHands(a, b) {

      if (a.vals[i] !== b.vals[i]) return a.vals[i] > b.vals[i] ? 1 : -1;
    }
    return 0;
  }

  function settleBetLog(issue, result, bankerCards, playerCards) {
    if (!issue) return;
    var log = loadBetLog();
    var group = findBetGroup(log, issue);
    if (!group || group.settled) return;
    var bt = evalHand(bankerCards);
    var pt = evalHand(playerCards);
    var resName = result === 'banker' ? '庄赢' : (result === 'player' ? '闲赢' : '和局');
    group.drawSummary = '庄 ' + bt.label + ' · 闲 ' + pt.label + ' · ' + resName;
    var totalProfit = 0;
    for (var i = 0; i < group.bets.length; i++) {
      var b = group.bets[i];
      var key = b.key;
      var odds = BET_ODDS[key];
      var win = false;
      if (key === 'banker') win = result === 'banker';
      else if (key === 'player') win = result === 'player';
      else if (key === 'tie') win = result === 'tie';
      else win = sideBetHit(key, bt, pt, result);
      var ret = 0;
      if (win && typeof odds === 'number') ret = b.amount + Math.floor(b.amount * odds);
      if (result === 'tie' && (key === 'banker' || key === 'player')) ret += b.amount;
      b.winAmount = ret;
      b.profit = ret - b.amount;
      if (win) { b.status = 'WON'; b.hit = (PLAY_LABELS[key] || '') + ' 中'; }
      else if (ret > 0) { b.status = 'WON'; b.hit = '和 · 退本'; }
      else { b.status = 'LOST'; b.hit = ''; }
      totalProfit += b.profit;
    }
    group.settled = true;
    group.settledAt = new Date().toISOString();
    group.totalProfit = totalProfit;
    saveBetLog(log);
  }

  function calcSettlement(result, bankerCards, playerCards) {
    var bt = evalHand(bankerCards);
    var pt = evalHand(playerCards);
    var stakeTotal = 0;
    var returnTotal = 0;
    var keys = Object.keys(betTotals);
    for (var i = 0; i < keys.length; i++) {
      var key = keys[i];
      var stake = betTotals[key] || 0;
      if (stake <= 0) continue;
      stakeTotal += stake;
      var odds = BET_ODDS[key];
      if (typeof odds !== 'number') continue;
      var win = false;
      if (key === 'banker') win = result === 'banker';
      else if (key === 'player') win = result === 'player';
      else if (key === 'tie') win = result === 'tie';
      else win = sideBetHit(key, bt, pt, result);
      if (win) returnTotal += stake + Math.floor(stake * odds);
      /* 庄闲和：和局时庄闲退本 */
      if (result === 'tie' && (key === 'banker' || key === 'player')) {
        returnTotal += stake;
      }
    }
    return {
      stakeTotal: stakeTotal,
      returnTotal: returnTotal,
      profit: returnTotal - stakeTotal
    };
  }

    var win = [];
    var lose = [];
    /* 主胜区始终作为飞入目标（即使该区暂无筹码） */
    if (result === 'banker') win.push('banker');
    else if (result === 'player') win.push('player');
    else if (result === 'tie') win.push('tie');
    for (var i = 0; i < all.length; i++) {
      var k = all[i];
      var has = chipsOn(k).length > 0;
      var isWin = false;
      if (k === 'banker') isWin = result === 'banker';
      else if (k === 'player') isWin = result === 'player';
      else if (k === 'tie') isWin = result === 'tie';
      else isWin = sideBetHit(k, bt, pt, result);
      /* 和局：庄闲退本，当作赢方区（不再被收走） */
      if (result === 'tie' && (k === 'banker' || k === 'player')) isWin = true;
      if (isWin) {
        if (win.indexOf(k) < 0 && (has || k === 'banker' || k === 'player' || k === 'tie')) win.push(k);
      } else if (has) {
        lose.push(k);
      }
    }
    return { win: win, lose: lose };
  }

  function collectPayout(result, settlement) {
    return new Promise(function (resolve) {
      stopOtherBetting();
      /* 庄赢/闲赢/和已在比牌时报过，这里不再叠播结果音，避免听成两遍 */
      if (settlement && settlement.returnTotal > 0) sfx('credit-loop-in', { vol: 0.7 });
      if (!payoutFlyLayer) {
        applySettlement(settlement);
        resolve();
        return;
      }
      payoutFlyLayer.innerHTML = '';

      var scoreEl = document.getElementById('statBalance') || statsBar;
      var playersIcon = document.querySelector('.zjh-players__icon') || document.getElementById('playersBox');
      var scoreRect = scoreEl ? layerRect(scoreEl) : null;
      var playersRect = playersIcon ? layerRect(playersIcon) : null;
      var landSize = barChipSize() * CHIP_LAND_SCALE;
      var wl = getWinLoseKeys(result);
      var winKeys = wl.win;
      var loseKeys = wl.lose;

      /* 收集输方筹码（保留归属） */
      var moving = [];
      for (var li = 0; li < loseKeys.length; li++) {
        var limgs = chipsOn(loseKeys[li]);
        for (var j = 0; j < limgs.length; j++) {
          moving.push({
            img: limgs[j],
            owner: limgs[j].getAttribute('data-owner') || 'other',
            value: parseInt(limgs[j].getAttribute('data-value'), 10) || 1,
            src: limgs[j].getAttribute('src') || CHIP_SRC[1]
          });
        }
      }

      var phase1 = [];
      if (moving.length && winKeys.length) {
        for (var mi = 0; mi < moving.length; mi++) {
          (function (chip, idx) {
            var targetKey = winKeys[idx % winKeys.length];
            var winBtn = betBtn(targetKey);
            if (!winBtn) return;
            var winBox = winBtn.querySelector('.zjh-bet-btn__chips') || winBtn;
            var winArea = layerRect(winBox);
            var src = layerRect(chip.img);
            var jx = (Math.random() - 0.5) * winArea.width * 0.55;
            var jy = (Math.random() - 0.5) * winArea.height * 0.45;
            var dst = { cx: winArea.cx + jx, cy: winArea.cy + jy, width: landSize, height: landSize };
            var slot = pickSlot(targetKey);
            phase1.push(delay(idx * 35).then(function () {
              chip.img.style.opacity = '0';
              return flyChipAbs(
                src, dst, chip.src, COLLECT_MS,
                landSize / Math.max(12, Math.min(src.width, src.height) || landSize)
              ).then(function () {
                /* 收来的筹码：自己在该赢区有注→算自己赢的；否则归他人→飞人数 */
                var potOwner = (betTotals[targetKey] || 0) > 0 ? 'me' : 'other';
                placeChipOnBtn(winBtn, chip.value, slot, landSize, potOwner);
              });
            }));
          })(moving[mi], mi);
        }
      } else if (moving.length && playersRect) {
        /* 无赢方：全部飞回人数图标消失 */
        for (var oi = 0; oi < moving.length; oi++) {
          (function (chip, idx) {
            var src = layerRect(chip.img);
            phase1.push(delay(idx * 30).then(function () {
              chip.img.style.opacity = '0';
              return flyChipAbs(src, playersRect, chip.src, TO_SCORE_MS, 0.35);
            }));
          })(moving[oi], oi);
        }
      }

      Promise.all(phase1).then(function () {
        for (var c = 0; c < loseKeys.length; c++) clearBetVisual(loseKeys[c]);

        /* 赢方区：自己的→积分，别人的→人数图标 */
        var meList = [];
        var otherList = [];
        for (var w = 0; w < winKeys.length; w++) {
          var wimgs = chipsOn(winKeys[w]);
          for (var n = 0; n < wimgs.length; n++) {
            if ((wimgs[n].getAttribute('data-owner') || 'other') === 'me') meList.push(wimgs[n]);
            else otherList.push(wimgs[n]);
          }
        }

        function trimList(arr, maxN) {
          if (arr.length <= maxN) return arr;
          var step = Math.ceil(arr.length / maxN);
          return arr.filter(function (_, i) { return i % step === 0; }).slice(0, maxN);
        }
        meList = trimList(meList, 12);
        otherList = trimList(otherList, 12);

        var phase2 = [];
        meList.forEach(function (img, idx) {
          if (!scoreRect) return;
          phase2.push(delay(idx * 38).then(function () {
            var src = layerRect(img);
            var srcUrl = img.getAttribute('src') || CHIP_SRC[1];
            img.style.opacity = '0';
            return flyChipAbs(src, scoreRect, srcUrl, TO_SCORE_MS, 0.42);
          }));
        });
        otherList.forEach(function (img, idx) {
          if (!playersRect) return;
          phase2.push(delay(idx * 38).then(function () {
            var src = layerRect(img);
            var srcUrl = img.getAttribute('src') || CHIP_SRC[1];
            img.style.opacity = '0';
            return flyChipAbs(src, playersRect, srcUrl, TO_SCORE_MS, 0.35);
          }));
        });

        return Promise.all(phase2).then(function () {
          /* 清空桌面筹码视觉，结算只计自己 */
          var allKeys = ['banker', 'player', 'tie', 'shunjin', 'baozi', 'san2', 'san3', 'san6', 'san7'];
          for (var a = 0; a < allKeys.length; a++) clearBetVisual(allKeys[a]);
          if (settlement && settlement.returnTotal > 0) sfx('win', { vol: 0.85 });
          applySettlement(settlement);
          resolve();
        });
      }).catch(function () {
        applySettlement(settlement);
        resolve();
      });
    });
  }

  function paint(doBeat) {

    timeEl.classList.remove('is-beat');

      box.classList.add('is-draw');

      return;

    timeEl.textContent = String(left);
    if (left <= 10) box.classList.add('is-urgent');
    if (left <= 5 && left > 0) {
      box.classList.add('is-critical');
      if (doBeat) {
        beat();
        sfx('countdown', { vol: 0.7, dedupeMs: 400 });

  function startBetRound() {
    phase = 'bet';
    roundBusy = false;
    currentBetIssue = '';
    left = TOTAL;
    payoutLeft = 0;
    lastBeatSec = -1;
    betDeadline = Date.now() + TOTAL * 1000;
    payoutDeadline = 0;
    hideAllCards();
    commitRoundBets();
    paint(false);
    syncActionButtons();
    startOtherBetting();
    ensureBgm(true);
    showPhaseBanner('start');
  }

  function startDrawRound() {
    /* 立刻锁局，防止 tick 重入 */
    if (roundBusy || phase !== 'bet') return;
    roundBusy = true;
    phase = 'draw';
    var seq = ++roundSeq;
    var roundIssue = currentBetIssue;
    stopOtherBetting();
    paint(false);
    syncActionButtons();
    hideAllCards();

    /* 先播完「停止下注」，再发牌/翻牌/报牌，避免声音抢在倒计时感还在时响起 */
    showPhaseBanner('stop')
      .then(function () {
        if (seq !== roundSeq) return null;
        return dealSix();
      })
      .then(function (hands) {
        if (seq !== roundSeq || !hands) return null;
        lastHands = hands;
        return delay(DEAL_HOLD_MS).then(function () { return hands; });
      })
      .then(function (hands) {
        if (seq !== roundSeq || !hands) return null;
        return flipSix().then(function () { return hands; });
      })
      .then(function (hands) {
        if (seq !== roundSeq || !hands) return null;
        var compared = showCompare(hands.banker, hands.player);
        lastRoundResult = compared.result;
        pushRoad(compared.result);
        highlightWinningBets(compared.result, hands.banker, hands.player);
        return announceShowdown(compared.bankerType, compared.playerType, compared.result)
          .then(function () {
            return { result: compared.result, hands: hands };
          });
      })
      .then(function (pack) {
        if (seq !== roundSeq || !pack) return null;
        var settlement = calcSettlement(pack.result, pack.hands.banker, pack.hands.player);
        settleBetLog(roundIssue, pack.result, pack.hands.banker, pack.hands.player);
        phase = 'payout';
        payoutLeft = PAYOUT_SECS;
        payoutDeadline = Date.now() + PAYOUT_SECS * 1000;
        paint(false);
        syncActionButtons();
        return collectPayout(pack.result, settlement);
      })
      .then(function () {
        if (seq !== roundSeq) return;
        roundBusy = false;
        paint(false);
      })
      .catch(function (err) {
        console.error(err);
        if (seq !== roundSeq) return;
        roundBusy = false;
        phase = 'bet';
        startBetRound();
      });
  }

  function tick() {
    var now = Date.now();
    if (phase === 'draw') {
      paint(false);
      return;
    }
    if (phase === 'payout') {
      payoutLeft = Math.max(0, Math.ceil((payoutDeadline - now) / 1000));
      if (payoutLeft <= 0) {
        startBetRound();
        return;
      }
      paint(false);
      return;
    }
    /* bet：按截止时间算剩余秒，避免 setInterval 重入导致倒计时加速、提前开奖 */
    if (roundBusy) return;
    left = Math.max(0, Math.ceil((betDeadline - now) / 1000));
    var doBeat = left !== lastBeatSec;
    if (doBeat) lastBeatSec = left;
    paint(doBeat);
    if (left <= 0) startDrawRound();
  }

  /* ---------- 筹码选择 + 下注飞入 ---------- */
  var CHIP_FLY_MS = 420;
  var CHIP_LAND_SCALE = 2 / 3;
  var CHIP_SRC = {
    1: './assets/ui/chips/chip-1.png?v=4',
    5: './assets/ui/chips/chip-5.png?v=4',

    10000: './assets/ui/chips/chip-10000.png?v=1'
  };
  var CHIP_PAGES = [
    [1, 5, 10, 50, 100, 500],
    [1000, 2000, 3000, 4000, 5000, 10000]
  ];
  var chipPage = 0;
  /* 落点数量：庄/和/闲/顺金/豹子=20，散牌/对子/顺子/金花=10 */
  var SLOT_COUNT = {
    banker: 20, tie: 20, player: 20, shunjin: 20, baozi: 20,
    san2: 10, san3: 10, san6: 10, san7: 10
  };
  var selectedChip = 1;
  var betTotals = {};
  var slotStacks = {}; /* key -> 每个落点已叠层数 */
  var roundPlacements = []; /* 本局每次落筹 {key,value} */
  var lastRoundPlacements = []; /* 仅上一局，不能隔局 */
  var rebetting = false;
  var usedUndo = false;  /* 当局撤销仅一次 */
  var usedRebet = false; /* 当局续押仅一次 */
  var chipBar = document.getElementById('chipBar');
  var actionBar = document.getElementById('actionBar');
  var slotCache = {};

  function buildSlots(count) {
    /* 真正散落：随机撒点 + 最小间距，避免网格感 */
    var slots = [];
    var minDist = count >= 20 ? 14 : 18;
    var padX = 8;
    var padY = 10;
    var tries = 0;
    var maxTries = count * 80;
    while (slots.length < count && tries < maxTries) {
      tries++;
      var x = padX + Math.random() * (100 - padX * 2);
      var y = padY + Math.random() * (100 - padY * 2);
      var ok = true;
      for (var i = 0; i < slots.length; i++) {
        var dx = x - slots[i].x;
        var dy = y - slots[i].y;
        if (dx * dx + dy * dy < minDist * minDist) {
          ok = false;
          break;
        }
      }
      if (ok) slots.push({ x: x, y: y });
    }
    /* 若随机不够，放宽间距补齐 */
    while (slots.length < count) {
      minDist *= 0.85;
      var filled = false;
      for (var t = 0; t < 40 && slots.length < count; t++) {
        var x2 = padX + Math.random() * (100 - padX * 2);
        var y2 = padY + Math.random() * (100 - padY * 2);
        var ok2 = true;
        for (var j = 0; j < slots.length; j++) {
          var dx2 = x2 - slots[j].x;
          var dy2 = y2 - slots[j].y;
          if (dx2 * dx2 + dy2 * dy2 < minDist * minDist) {
            ok2 = false;
            break;
          }
        }
        if (ok2) {
          slots.push({ x: x2, y: y2 });
          filled = true;
        }
      }
      if (!filled) {
        slots.push({
          x: padX + Math.random() * (100 - padX * 2),
          y: padY + Math.random() * (100 - padY * 2)
        });
      }
    }
    return slots;
  }

  function getSlots(key) {
    if (!slotCache[key]) {
      slotCache[key] = buildSlots(SLOT_COUNT[key] || 10);
    }
    return slotCache[key];
  }

  function pickSlot(key) {
    var slots = getSlots(key);
    var idx = Math.floor(Math.random() * slots.length);
    if (!slotStacks[key]) slotStacks[key] = [];
    var stack = slotStacks[key];
    var layer = stack[idx] || 0;
    stack[idx] = layer + 1;
    var base = slots[idx];
    /* 每次再抖一点，同点叠层也更自然 */
    var rx = (Math.random() - 0.5) * 6;
    var ry = (Math.random() - 0.5) * 5;
    return {
      idx: idx,
      layer: layer,
      x: Math.max(5, Math.min(95, base.x + rx + (layer % 3) * 0.9)),
      y: Math.max(6, Math.min(94, base.y + ry - layer * 2.1))
    };
  }

  function fmtStake(n) {
    /* 千分位完整数字，避免「0.1万」这种难看增幅 */
    return Number(n).toLocaleString('en-US');
  }

  function clearBets() {
    betTotals = {};
    slotStacks = {};
    roundPlacements = [];
    var btns = betArea.querySelectorAll('.zjh-bet-btn');
    for (var i = 0; i < btns.length; i++) {

  function canUndo() {
    return !isClosed() && !rebetting && !usedUndo && roundPlacements.length > 0;
  }

  function canRebet() {
    /* 上一局有注、本局还没下过、当局未用过续押 */
    return !isClosed() && !rebetting && !usedRebet &&
      lastRoundPlacements.length > 0 && roundPlacements.length === 0;
  }

  function syncActionButtons() {
    var undoBtn = actionBar.querySelector('[data-action="undo"]');
    var rebetBtn = actionBar.querySelector('[data-action="rebet"]');
    var u = canUndo();
    var r = canRebet();
    if (undoBtn) {
      undoBtn.classList.toggle('is-disabled', !u);
      undoBtn.setAttribute('aria-disabled', u ? 'false' : 'true');
    }
    if (rebetBtn) {
      rebetBtn.classList.toggle('is-disabled', !r);
      rebetBtn.setAttribute('aria-disabled', r ? 'false' : 'true');
    }
  }

  /* 开奖结束进入新一轮：只记本局为上一局（没下过则清空，不能隔局） */
  function commitRoundBets() {
    lastRoundPlacements = roundPlacements.map(function (p) {
      return { key: p.key, value: p.value };
    });
    clearBets();
    usedUndo = false;
    usedRebet = false;
    rebetting = false;
    syncActionButtons();
  }

  function undoAllBets() {
    if (!canUndo()) return;
    usedUndo = true;
    usedRebet = false;
    /* 退回本局已扣积分 */
    if (window.App && App.getBalance && user && roundPlacements.length) {
      var refund = 0;
      for (var i = 0; i < roundPlacements.length; i++) refund += roundPlacements[i].value;
      if (refund > 0) {
        App.setBalance(user.uid, App.getBalance(user.uid) + refund);
        refreshStats();
      }
    }
    /* 同步移除本局注单日志组，避免撤销后仍显示已下注 */
    if (currentBetIssue) {
      var log = loadBetLog();
      var kept = [];
      for (var j = 0; j < log.length; j++) {
        if (log[j].issue !== currentBetIssue) kept.push(log[j]);
      }
      if (kept.length !== log.length) saveBetLog(kept);
    }
    clearBets();
    syncActionButtons();
  }

  function rebetLastRound() {
    if (!canRebet()) return;
    var list = lastRoundPlacements.slice();
    var n = list.length;
    var need = 0;
    for (var t = 0; t < n; t++) need += list[t].value;
    if (window.App && App.getBalance && user) {
      var bal = App.getBalance(user.uid);
      if (bal < need) {
        if (App.toast) App.toast('积分不足');
        return;
      }
      App.setBalance(user.uid, bal - need);
      refreshStats();
    }
    usedRebet = true;
    rebetting = true;
    syncActionButtons();

    var landSize = barChipSize() * CHIP_LAND_SCALE;
    /* 整段续押在 1 秒内完成（含飞入落地） */
    var flyMs = n <= 1 ? 360 : Math.min(320, Math.floor(700 / Math.max(1, Math.ceil(n / 6))));
    var gap = n <= 1 ? 0 : Math.max(12, Math.floor((1000 - flyMs) / (n - 1)));

    var i = 0;
    function next() {
      if (i >= n || isClosed()) {
        rebetting = false;
        syncActionButtons();
        return;
      }
      var p = list[i++];
      var btn = betArea.querySelector('.zjh-bet-btn[data-bet="' + p.key + '"]');
      if (btn) {
        var slot = pickSlot(p.key);
        betTotals[p.key] = (betTotals[p.key] || 0) + p.value;
        roundPlacements.push({ key: p.key, value: p.value });
        appendBetLog(p.key, p.value);
        updateStakeUI(btn, betTotals[p.key]);
        flyChipToBet(btn, p.value, slot, landSize, flyMs, 'me');

  function pct(n, total) {

  /** 大路：同色连下，换色新列；和局挂在上一颗上 */
  function buildBigRoad(history) {
    var cols = [];
    var lastSide = null;
    var pendingTies = 0;

    function place(side, ties) {
      var col = cols.length ? cols[cols.length - 1] : null;
      var canDown = col && col.side === side && col.cells.length < ROAD_ROWS && !col.dragon;
      if (!canDown) {
        col = { side: side, cells: [], dragon: false };
        cols.push(col);
      }
      if (col.cells.length >= ROAD_ROWS) {
        col.dragon = true;
        cols.push({ side: side, cells: [{ side: side, ties: ties }], dragon: true });
        return;
      }
      col.cells.push({ side: side, ties: ties });
    }

    for (var i = 0; i < history.length; i++) {
      var r = history[i];
      if (r === 'tie') {
        if (!cols.length) {
          pendingTies += 1;
        } else {
          var lastCol = cols[cols.length - 1];
          var lastCell = lastCol.cells[lastCol.cells.length - 1];
          lastCell.ties += 1;
        }
        continue;
      }
      place(r, pendingTies);
      pendingTies = 0;
      lastSide = r;
    }
    return cols;
  }

  function renderBead() {
    if (!beadGrid) return;
    var filledCols = Math.ceil(roadHistory.length / ROAD_ROWS) || 0;
    /* 末尾只留 1 列空白，最新一颗贴近右缘；写满后向右延伸靠滚动看最新 */
    var cols = Math.max(ROAD_MIN_COLS, filledCols + 1);
    var lastIdx = roadHistory.length - 1;
    var html = '';
    for (var c = 0; c < cols; c++) {
      for (var r = 0; r < ROAD_ROWS; r++) {
        var idx = c * ROAD_ROWS + r;
        if (idx < roadHistory.length) {
          var kind = roadHistory[idx];
          var latest = idx === lastIdx ? ' is-latest' : '';
          html += '<span class="zjh-bead zjh-bead--' + kind + latest + '" role="listitem" title="' + ROAD_NAMES[kind] + '" aria-label="' + ROAD_NAMES[kind] + '">' +
            ROAD_LABELS[kind] + '</span>';
        } else {
          html += '<span class="zjh-bead zjh-bead--empty" aria-hidden="true"></span>';
        }
      }
    }
    beadGrid.innerHTML = html;
    beadGrid.style.setProperty('--road-cols', String(cols));
    syncRoadGridWidth(beadGrid, cols);
  }

  function renderBig() {
    if (!bigGrid) return;
    var colsData = buildBigRoad(roadHistory);
    var cols = Math.max(ROAD_MIN_COLS, colsData.length + 1);
    var html = '';
    var lastCol = colsData.length - 1;
    var lastRow = lastCol >= 0 ? colsData[lastCol].cells.length - 1 : -1;

    for (var c = 0; c < cols; c++) {
      var col = colsData[c];
      for (var r = 0; r < ROAD_ROWS; r++) {
        if (col && r < col.cells.length) {
          var cell = col.cells[r];
          var latest = (c === lastCol && r === lastRow) ? ' is-latest' : '';
          var tieHtml = '';
          if (cell.ties > 0) {
            var n = cell.ties > 9 ? 9 : cell.ties;
            var label = n > 1 ? String(n) : '';
            tieHtml = '<i class="zjh-big__tie" data-n="' + n + '">' + label + '</i>';
          }
          html += '<span class="zjh-big zjh-big--' + cell.side + latest + '" role="listitem">' +
            tieHtml + '</span>';
        } else {
          html += '<span class="zjh-big zjh-big--empty" aria-hidden="true"></span>';

    bigGrid.innerHTML = html;

  /** 按列数写死宽度，保证超出可视区后一定能横向滚动 */
  function syncRoadGridWidth(grid, cols) {
    if (!grid || !cols) return;
    var sample = grid.querySelector('.zjh-bead, .zjh-big');
    var gap = 2;
    var cell = sample ? sample.getBoundingClientRect().width : 0;
    if (!(cell > 4)) {
      /* 布局未完成时用容器高度估算（与 CSS --cell 一致） */
      var sc = grid.closest('.zjh-roadmap__scroll');
      var h = sc ? sc.clientHeight : 0;
      cell = h > 8 ? (h - 6 - 5 * gap) / 6 : 22;
    }
    grid.style.width = (cols * (cell + gap) - gap) + 'px';
  }

  function pushRoad(result) {
    if (!ROAD_LABELS[result]) return;
    /* 累计局数只增不减 */
    if (roadStats[result] != null) {

    if (roadHistory.length > ROAD_MAX) {
      var over = roadHistory.length - ROAD_MAX;
      over = Math.ceil(over / ROAD_ROWS) * ROAD_ROWS;
      roadHistory = roadHistory.slice(over);
    }
    saveRoad();
    renderRoad();
  }

          '<span>总局 <b>' + total + '</b></span>' +
        '</div>' +
        '<div class="zjh-sheet-road__label">珠盘路（当前 ' + roadHistory.length + ' 局）</div>' +
        '<div class="zjh-sheet-road__scroll"><div class="zjh-sheet-road__grid">' + buildBeadCells(roadHistory) + '</div></div>' +
        '<div class="zjh-sheet-road__label">大路</div>' +
        '<div class="zjh-sheet-road__scroll"><div class="zjh-sheet-road__grid">' + buildBigCells(roadHistory) + '</div></div>';
      openSheet('历史记录', html);
      var scrolls = sheetBody.querySelectorAll('.zjh-sheet-road__scroll');
      for (var i = 0; i < scrolls.length; i++) scrolls[i].scrollLeft = scrolls[i].scrollWidth;
    });

    /* 玩法规则 */
    var rulesBtn = document.getElementById('railRules');
    if (rulesBtn) rulesBtn.addEventListener('click', function () {
      var rows = [
        ['庄 / 闲', '押中牌型更大的一方', '1 : 0.95'],
        ['和', '庄闲牌型比点相同', '1 : 8'],
        ['顺金', '赢方牌型为同花顺（和局时任一方）', '1 : 20'],
        ['豹子', '赢方牌型为三条/豹子（和局时任一方）', '1 : 50'],
        ['顺子', '赢方牌型为顺子（和局时任一方）', '1 : 15'],
        ['金花', '赢方牌型为同花（和局时任一方）', '1 : 8'],
        ['对子', '赢方牌型为对子（和局时任一方）', '1 : 11'],
        ['散牌', '赢方牌型为散牌（和局时任一方）', '1 : 1']
      ];
      var body = '';
      for (var i = 0; i < rows.length; i++) {
        body += '<tr><td>' + rows[i][0] + '</td><td>' + rows[i][1] + '</td><td class="odds">' + rows[i][2] + '</td></tr>';
      }
      var html =
        '<p class="zjh-rules__intro">庄闲各发三张牌，牌型由大到小：豹子 &gt; 顺金 &gt; 金花 &gt; 顺子 &gt; 对子 &gt; 散牌。押注庄/闲比牌型大小，也可对单独牌型玩法下注。</p>' +
        '<table class="zjh-rules__table"><thead><tr><th>玩法</th><th>说明</th><th class="odds">赔率</th></tr></thead><tbody>' + body + '</tbody></table>';
      openSheet('玩法规则', html);
    });

    /* 设置：背景音乐 / 音效开关 */
    var setBtn = document.getElementById('railSettings');
    if (setBtn) setBtn.addEventListener('click', function () {
      var html =
        '<div class="zjh-setting-row"><span class="zjh-setting-row__label">背景音乐</span>' +
          '<button type="button" class="zjh-switch' + (audioPref.music ? ' is-on' : '') + '" id="swMusic" role="switch" aria-checked="' + audioPref.music + '"></button></div>' +
        '<div class="zjh-setting-row"><span class="zjh-setting-row__label">游戏音效</span>' +
          '<button type="button" class="zjh-switch' + (audioPref.sfx ? ' is-on' : '') + '" id="swSfx" role="switch" aria-checked="' + audioPref.sfx + '"></button></div>';
      openSheet('设置', html);
      var swMusic = document.getElementById('swMusic');
      var swSfx = document.getElementById('swSfx');
      if (swMusic) swMusic.addEventListener('click', function () {
        var on = !swMusic.classList.contains('is-on');
        swMusic.classList.toggle('is-on', on);
        swMusic.setAttribute('aria-checked', String(on));
        setMusicOn(on);
      });
      if (swSfx) swSfx.addEventListener('click', function () {
        var on = !swSfx.classList.contains('is-on');
        swSfx.classList.toggle('is-on', on);
        swSfx.setAttribute('aria-checked', String(on));
        setSfxOn(on);
      });
    });
  })();

  /* ---------- 在线人数（桌边右侧） ---------- */
  var playersCountEl = document.getElementById('playersCount');
  var onlinePlayers = 36 + Math.floor(Math.random() * 28);

  function paintPlayers() {
    if (playersCountEl) playersCountEl.textContent = String(onlinePlayers);
  }

  function tickPlayers() {
    var d = Math.floor(Math.random() * 5) - 2;
    onlinePlayers = Math.max(18, Math.min(99, onlinePlayers + d));
    paintPlayers();
  }

  paintPlayers();
  if (window.__zjhPlayersTimer) clearInterval(window.__zjhPlayersTimer);
  window.__zjhPlayersTimer = setInterval(tickPlayers, 8000);

  /* 全部变量就绪后再开局 + 启动唯一倒计时 */
  hideAllCards();
  startBetRound();
  if (window.__zjhTickTimer) clearInterval(window.__zjhTickTimer);
  window.__zjhTickTimer = setInterval(tick, 200);
  window.__zjhBooted = true;

})();
</script>

</body>
</html>
